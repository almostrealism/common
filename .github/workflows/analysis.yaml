name: "Build and Test"

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn install -DskipTests

      - name: Code Policy Enforcement
        run: |
          LD_LIBRARY_PATH=Extensions mvn test -pl utils \
           -Dtest=CodePolicyEnforcementTest \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_LIBS=Extensions

  build-mac:
    runs-on: [self-hosted, macos, ar-ci]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Fix macOS protoc binaries
        run: |
          # Trigger protoc plugin download (will fail on execution, that's expected)
          mvn generate-sources -pl ml -DskipTests 2>/dev/null || true
          # Fix permissions, clear extended attributes, and ad-hoc codesign
          find . -path "*/protoc-plugins/*" -type f -exec chmod +x {} \; \
            -exec xattr -cr {} \; \
            -exec codesign -f -s - {} \;
          find "${HOME}/.m2/repository" -type f -name "*.exe" -exec chmod +x {} \; \
            -exec xattr -cr {} \; \
            -exec codesign -f -s - {} \;

      - name: Build (skip tests)
        run: mvn install -DskipTests

  test:
    needs: build
    runs-on: [self-hosted, linux, ar-ci]
    strategy:
      fail-fast: true
      matrix:
        group: [0, 1, 2, 3, 4, 5, 6]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn install -DskipTests

      - name: Run Utils Tests (Group ${{ matrix.group }})
        run: |
          LD_LIBRARY_PATH=Extensions mvn test -pl utils \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS=Extensions \
           -DAR_TEST_GROUP=${{ matrix.group }} \
           -DAR_TEST_GROUPS=7

      - name: Collect Coverage Data
        if: always()
        run: |
          mkdir -p coverage-data
          find . -path "*/target/jacoco.exec" -exec cp --parents {} coverage-data/ \;

      - name: Upload Coverage Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-group-${{ matrix.group }}
          path: coverage-data/
          retention-days: 1

  test-ml:
    needs: test
    runs-on: [self-hosted, linux, ar-ci]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn install -DskipTests

      - name: Run ML Tests
        run: |
          LD_LIBRARY_PATH=Extensions mvn test -pl ml \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS=Extensions \
           -DAR_TEST_PROFILE=pipeline

      - name: Collect Coverage Data
        if: always()
        run: |
          mkdir -p coverage-data
          find . -path "*/target/jacoco.exec" -exec cp --parents {} coverage-data/ \;

      - name: Upload Coverage Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ml
          path: coverage-data/
          retention-days: 1

  test-audio:
    needs: test
    runs-on: [self-hosted, linux, ar-ci]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn install -DskipTests

      - name: Run Audio Tests
        run: |
          LD_LIBRARY_PATH=Extensions mvn test -pl audio \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS=Extensions \
           -DAR_TEST_PROFILE=pipeline

      - name: Collect Coverage Data
        if: always()
        run: |
          mkdir -p coverage-data
          find . -path "*/target/jacoco.exec" -exec cp --parents {} coverage-data/ \;

      - name: Upload Coverage Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-audio
          path: coverage-data/
          retention-days: 1

  test-music:
    needs: [test-ml, test-audio]
    runs-on: [self-hosted, linux, ar-ci]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn install -DskipTests

      - name: Run Music Tests
        run: |
          LD_LIBRARY_PATH=Extensions mvn test -pl music \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS=Extensions \
           -DAR_TEST_PROFILE=pipeline

      - name: Run Compose Tests
        run: |
          LD_LIBRARY_PATH=Extensions mvn test -pl compose \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS=Extensions \
           -DAR_TEST_PROFILE=pipeline

      - name: Collect Coverage Data
        if: always()
        run: |
          mkdir -p coverage-data
          find . -path "*/target/jacoco.exec" -exec cp --parents {} coverage-data/ \;

      - name: Upload Coverage Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-music
          path: coverage-data/
          retention-days: 1

  # ─── macOS Test Jobs ────────────────────────────────────────────────
  # Each macOS job depends on its Linux counterpart passing, but does
  # NOT block subsequent Linux jobs. This creates a trailing verification
  # pattern where macOS tests run in parallel with the next Linux stage.

  test-mac:
    needs: [build-mac, test]
    runs-on: [self-hosted, macos, ar-ci]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Fix macOS protoc binaries
        run: |
          mvn generate-sources -pl ml -DskipTests 2>/dev/null || true
          find . -path "*/protoc-plugins/*" -type f -exec chmod +x {} \; \
            -exec xattr -cr {} \; \
            -exec codesign -f -s - {} \; 2>/dev/null || true
          find "${HOME}/.m2/repository" -type f -name "*.exe" -exec chmod +x {} \; \
            -exec xattr -cr {} \; \
            -exec codesign -f -s - {} \; 2>/dev/null || true

      - name: Build (skip tests)
        run: mvn install -DskipTests

      - name: Run Utils Tests
        run: |
          DYLD_LIBRARY_PATH=Extensions mvn test -pl utils \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS=Extensions \
           -DAR_TEST_PROFILE=pipeline

  test-ml-mac:
    needs: [build-mac, test-ml]
    runs-on: [self-hosted, macos, ar-ci]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Fix macOS protoc binaries
        run: |
          mvn generate-sources -pl ml -DskipTests 2>/dev/null || true
          find . -path "*/protoc-plugins/*" -type f -exec chmod +x {} \; \
            -exec xattr -cr {} \; \
            -exec codesign -f -s - {} \; 2>/dev/null || true
          find "${HOME}/.m2/repository" -type f -name "*.exe" -exec chmod +x {} \; \
            -exec xattr -cr {} \; \
            -exec codesign -f -s - {} \; 2>/dev/null || true

      - name: Build (skip tests)
        run: mvn install -DskipTests

      - name: Run ML Tests
        run: |
          DYLD_LIBRARY_PATH=Extensions mvn test -pl ml \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS=Extensions \
           -DAR_TEST_PROFILE=pipeline

  test-audio-mac:
    needs: [build-mac, test-audio]
    runs-on: [self-hosted, macos, ar-ci]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Fix macOS protoc binaries
        run: |
          mvn generate-sources -pl ml -DskipTests 2>/dev/null || true
          find . -path "*/protoc-plugins/*" -type f -exec chmod +x {} \; \
            -exec xattr -cr {} \; \
            -exec codesign -f -s - {} \; 2>/dev/null || true
          find "${HOME}/.m2/repository" -type f -name "*.exe" -exec chmod +x {} \; \
            -exec xattr -cr {} \; \
            -exec codesign -f -s - {} \; 2>/dev/null || true

      - name: Build (skip tests)
        run: mvn install -DskipTests

      - name: Run Audio Tests
        run: |
          DYLD_LIBRARY_PATH=Extensions mvn test -pl audio \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS=Extensions \
           -DAR_TEST_PROFILE=pipeline

  test-music-mac:
    needs: [build-mac, test-music]
    runs-on: [self-hosted, macos, ar-ci]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Fix macOS protoc binaries
        run: |
          mvn generate-sources -pl ml -DskipTests 2>/dev/null || true
          find . -path "*/protoc-plugins/*" -type f -exec chmod +x {} \; \
            -exec xattr -cr {} \; \
            -exec codesign -f -s - {} \; 2>/dev/null || true
          find "${HOME}/.m2/repository" -type f -name "*.exe" -exec chmod +x {} \; \
            -exec xattr -cr {} \; \
            -exec codesign -f -s - {} \; 2>/dev/null || true

      - name: Build (skip tests)
        run: mvn install -DskipTests

      - name: Run Music Tests
        run: |
          DYLD_LIBRARY_PATH=Extensions mvn test -pl music \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS=Extensions \
           -DAR_TEST_PROFILE=pipeline

      - name: Run Compose Tests
        run: |
          DYLD_LIBRARY_PATH=Extensions mvn test -pl compose \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS=Extensions \
           -DAR_TEST_PROFILE=pipeline

  analysis:
    needs: [test-ml, test-audio, test-music]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build for Analysis
        run: mvn install -DskipTests

      - name: Download All Coverage Data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: all-coverage

      - name: Merge Coverage Data
        run: |
          # Find all jacoco.exec files and create a file list
          find all-coverage -name "jacoco.exec" > exec-files.txt
          echo "Found coverage files:"
          cat exec-files.txt

          # Create merged coverage directory
          mkdir -p .qodana/code-coverage

          # Use JaCoCo CLI to merge all exec files
          if [ -s exec-files.txt ]; then
            # Download JaCoCo CLI
            JACOCO_VERSION=0.8.11
            curl -sL -o jacoco-cli.zip \
              "https://repo1.maven.org/maven2/org/jacoco/jacoco/$JACOCO_VERSION/jacoco-$JACOCO_VERSION.zip"
            unzip -q jacoco-cli.zip -d jacoco-cli

            # Merge all exec files
            java -jar jacoco-cli/lib/jacococli.jar merge \
              $(cat exec-files.txt | tr '\n' ' ') \
              --destfile merged-jacoco.exec

            # Generate XML report for Qodana
            # Need to specify all class directories (each as separate --classfiles arg)
            java -jar jacoco-cli/lib/jacococli.jar report merged-jacoco.exec \
              $(find . -path "*/target/classes" -type d -exec echo --classfiles {} \;) \
              $(find . -path "*/src/main/java" -type d -exec echo --sourcefiles {} \;) \
              --xml .qodana/code-coverage/coverage.xml \
              --html .qodana/code-coverage/html

            echo "Coverage report generated at .qodana/code-coverage/"
          else
            echo "No coverage files found"
          fi

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .qodana/code-coverage/
          retention-days: 30

      - name: Qodana Scan
        uses: JetBrains/qodana-action@main
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          args: "-i,.,--linter,jetbrains/qodana-jvm"
          pr-mode: false

      - name: Github Scan
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana.sarif.json
