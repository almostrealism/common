name: "Build and Test"

on:
  workflow_dispatch:
    inputs:
      auto_resolve:
        description: 'Submit auto-resolve agent jobs to FlowTree'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      override_integrity_checks:
        description: 'Ignore the outcome of the integrity-check jobs (test-integrity-check, checkstyle-integrity-check) so a stuck pipeline can complete. Use only when a block is a known false positive.'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  # ─── Change Detection ─────────────────────────────────────────────
  # Determines whether code files were changed. If only documentation
  # files were modified, downstream test jobs are skipped to save CI
  # compute. workflow_dispatch always runs the full pipeline.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.filter.outputs.code }}
      started_at: ${{ steps.timing.outputs.started_at }}
      base_changed: ${{ steps.filter.outputs.base_changed }}
      compute_changed: ${{ steps.filter.outputs.compute_changed }}
      domain_changed: ${{ steps.filter.outputs.domain_changed }}
      engine_changed: ${{ steps.filter.outputs.engine_changed }}
      extern_changed: ${{ steps.filter.outputs.extern_changed }}
      studio_changed: ${{ steps.filter.outputs.studio_changed }}
      python_changed: ${{ steps.filter.outputs.python_changed }}
      agent_isolation_changed: ${{ steps.filter.outputs.agent_isolation_changed }}
    steps:
      - name: Record pipeline start time
        id: timing
        run: echo "started_at=$(date +%s000)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - id: filter
        run: |
          set_all_flags_true() {
            echo "code=true" >> "$GITHUB_OUTPUT"
            for layer in base compute domain engine extern studio; do
              echo "${layer}_changed=true" >> "$GITHUB_OUTPUT"
            done
            echo "python_changed=true" >> "$GITHUB_OUTPUT"
            echo "agent_isolation_changed=true" >> "$GITHUB_OUTPUT"
          }

          # workflow_dispatch always runs the full pipeline
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            set_all_flags_true
            exit 0
          fi

          # Push to master: ALL tests must run unconditionally.
          # Layer-based skipping and docs-only skipping apply only to PRs,
          # where we are evaluating whether a feature branch warrants
          # running specific test groups. On master, every push (whether a
          # direct push or a merged PR) must execute the complete test
          # suite to guarantee full coverage on the default branch.
          if [ "${{ github.event_name }}" = "push" ]; then
            set_all_flags_true
            echo "::notice::Push to master — running full pipeline (no layer skipping)"
            exit 0
          fi

          # ── Below here: pull_request events only ──

          BASE="${{ github.event.pull_request.base.sha }}"

          # If BASE is all zeros (initial push / new branch), run full pipeline
          if echo "$BASE" | grep -qE '^0+$'; then
            set_all_flags_true
            echo "::notice::Initial push detected — running full pipeline"
            exit 0
          fi

          # Look for non-doc code files (java, xml, yaml, yml, sh, py, groovy, properties)
          CODE_FILES=$(git diff --name-only "$BASE" HEAD -- \
            '*.java' '*.xml' '*.yaml' '*.yml' '*.sh' '*.py' '*.groovy' '*.properties' \
            | grep -v '^docs/' | grep -v '\.md$' || true)
          if [ -z "$CODE_FILES" ]; then
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Docs-only change detected — skipping test pipeline"
          else
            echo "code=true" >> "$GITHUB_OUTPUT"
          fi

          # Layer change detection for selective test skipping (PR only).
          # Each layer flag indicates whether files in that directory were
          # modified. Test jobs use these flags to skip when their layer
          # (and all layers below it) are unmodified.
          for layer in base compute domain engine extern studio; do
            LAYER_FILES=$(git diff --name-only "$BASE" HEAD -- "${layer}/" || true)
            if [ -n "$LAYER_FILES" ]; then
              echo "${layer}_changed=true" >> "$GITHUB_OUTPUT"
              echo "::notice::Layer '${layer}' has changes"
            else
              echo "${layer}_changed=false" >> "$GITHUB_OUTPUT"
            fi
          done

          # Python change detection. The python-tests job runs the unittest
          # suites under tools/mcp/manager and tools/tests, which exercise
          # the Python code under tools/. Gate the job on .py changes
          # (anywhere) and on the pinned dependency file to avoid running
          # the suite when only Java/CI/docs changed.
          PY_FILES=$(git diff --name-only "$BASE" HEAD -- \
            '*.py' 'tools/mcp/requirements.txt' || true)
          if [ -n "$PY_FILES" ]; then
            echo "python_changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Python sources changed — running python-tests"
          else
            echo "python_changed=false" >> "$GITHUB_OUTPUT"
          fi

          # Agent volume isolation detection. The agent-volume-isolation job
          # validates the FlowTree agent docker-compose configuration and its
          # validator. Gate it on the specific inputs it checks so it is
          # skipped (treated as passing) when none of them change. This is a
          # path-based flag, not a layer flag — it does not participate in the
          # Maven layer graph.
          ISO_FILES=$(git diff --name-only "$BASE" HEAD -- \
            'flowtree/runtime/agent/docker-compose.yml' \
            'flowtree/runtime/agent/entrypoint.sh' \
            'tools/ci/validate_agent_volume_isolation.py' \
            'tools/ci/test_validate_agent_volume_isolation.py' \
            '.github/workflows/analysis.yaml' || true)
          if [ -n "$ISO_FILES" ]; then
            echo "agent_isolation_changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Agent volume isolation inputs changed — running validation"
          else
            echo "agent_isolation_changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: changes
    if: needs.changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build
        run: mvn install -DskipTests -Dcheckstyle.skip=true

  # ─── Code Policy Enforcement ───────────────────────────────────────
  code-policy-check:
    needs: build
    runs-on: ubuntu-latest
    # Critical path: failures block the test jobs and trigger auto-resolve.
    outputs:
      passed: ${{ steps.check.outcome == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn install -DskipTests -Dcheckstyle.skip=true

      - name: Code Policy Enforcement
        id: check
        run: |
          LD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl tools \
           -Dtest="CodePolicyEnforcementTest#enforceCodePolicies+testDetector*" \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs"

      - name: Summary
        if: ${{ !cancelled() }}
        run: |
          echo "## Code Policy Enforcement" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check.outcome }}" = "success" ]; then
            echo "No code policy violations detected." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Code policy violations detected (PackedCollection GPU model, Features interfaces, etc.)." >> "$GITHUB_STEP_SUMMARY"
            echo "Run \`mvn test -pl tools -Dtest=CodePolicyEnforcementTest#enforceCodePolicies\` locally to see details." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─── Test Integrity Check ────────────────────────────────────────────
  # Detects modifications to existing test files that hide failures
  # (e.g., adding @Ignore, deleting assertions, weakening checks).
  # This job FAILS the build to prevent test-hiding from being merged.
  test-integrity-check:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.check.outcome == 'success' }}
      violation_count: ${{ steps.check.outputs.violation_count }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin master:refs/remotes/origin/master --no-tags

      - name: Check for enforcement infrastructure tampering
        id: enforcement
        if: github.ref != 'refs/heads/master'
        env:
          OVERRIDE_INTEGRITY: ${{ inputs.override_integrity_checks }}
        run: |
          # These files are the enforcement infrastructure. Any modification
          # on a PR branch is treated as tampering and fails the build.
          PROTECTED_FILES=(
            "engine/utils/src/main/java/org/almostrealism/util/PolicyViolationDetector.java"
            "engine/utils/src/main/java/org/almostrealism/util/CodePolicyViolationDetector.java"
            "engine/utils/src/main/java/org/almostrealism/util/PackedCollectionDetector.java"
            "engine/utils/src/main/java/org/almostrealism/util/SetMemLiteralsDetector.java"
            "engine/utils/src/main/java/org/almostrealism/util/ProducerPatternDetector.java"
            "engine/utils/src/main/java/org/almostrealism/util/NamingConventionDetector.java"
            "engine/utils/src/main/java/org/almostrealism/util/DuplicateCodeDetector.java"
            "engine/utils/src/main/java/org/almostrealism/util/VersionReferenceDetector.java"
            "engine/utils/src/main/java/org/almostrealism/util/PlanningDocumentReferenceDetector.java"
            "engine/utils/src/main/java/org/almostrealism/util/LineNumberReferenceDetector.java"
            "engine/utils/src/main/java/org/almostrealism/util/ReflectiveInvocationDetector.java"
            "engine/utils/src/main/java/org/almostrealism/util/TestTimeoutEnforcementScanner.java"
            "engine/utils/src/main/resources/org/almostrealism/util/setmem-violation-baseline.tsv"
            "tools/src/test/java/org/almostrealism/util/test/CodePolicyEnforcementTest.java"
            "tools/ci/agent-protection/detect-test-hiding.sh"
            "tools/ci/agent-protection/check-quality-gates.sh"
            "tools/ci/agent-protection/validate-agent-commit.sh"
            "tools/ci/agent-protection/deception-audit.sh"
            "tools/ci/agent-protection/verify-sensitive-bypass.sh"
            "tools/ci/agent-protection/verify-memory-claim.sh"
          )

          TAMPERED=""
          for f in "${PROTECTED_FILES[@]}"; do
            if git diff --name-only origin/master...HEAD -- "$f" | grep -q .; then
              TAMPERED="${TAMPERED}- ${f}\n"
            fi
          done

          if [ -n "$TAMPERED" ]; then
            echo "::error::Enforcement infrastructure was modified — this is not allowed on PR branches"
            echo -e "## Enforcement Infrastructure Tampering Detected\n" > ${RUNNER_TEMP}/enforcement-report.txt
            echo -e "The following protected files were modified on this branch:\n" >> ${RUNNER_TEMP}/enforcement-report.txt
            echo -e "$TAMPERED" >> ${RUNNER_TEMP}/enforcement-report.txt
            echo -e "\nThese files enforce code policies and test integrity. They CANNOT be" >> ${RUNNER_TEMP}/enforcement-report.txt
            echo -e "modified on PR branches. The only way to pass the build is to fix the" >> ${RUNNER_TEMP}/enforcement-report.txt
            echo -e "production code that violates the policies — not to weaken the policies.\n" >> ${RUNNER_TEMP}/enforcement-report.txt
            echo -e "If you believe a policy needs to change, open a separate PR with a" >> ${RUNNER_TEMP}/enforcement-report.txt
            echo -e "justification for human review." >> ${RUNNER_TEMP}/enforcement-report.txt
            cat ${RUNNER_TEMP}/enforcement-report.txt
            if [ "$OVERRIDE_INTEGRITY" = "true" ]; then
              echo "::warning::Enforcement infrastructure tampering detected but IGNORED via the override_integrity_checks input"
            else
              exit 1
            fi
          else
            echo "No enforcement infrastructure modifications detected."
          fi

      - name: Check for test-hiding modifications
        id: check
        if: github.ref != 'refs/heads/master'
        env:
          OVERRIDE_INTEGRITY: ${{ inputs.override_integrity_checks }}
        run: |
          chmod +x ./tools/ci/agent-protection/detect-test-hiding.sh
          ./tools/ci/agent-protection/detect-test-hiding.sh origin/master ${RUNNER_TEMP}/test-integrity-report.txt || {
            EXIT_CODE=$?
            if [ "$EXIT_CODE" -eq 2 ]; then
              echo "::error::Test integrity violations detected — existing tests were modified to hide failures"
              if [ "$OVERRIDE_INTEGRITY" = "true" ]; then
                echo "::warning::Test integrity violations IGNORED via the override_integrity_checks input"
                exit 0
              fi
              exit 1
            fi
            exit "$EXIT_CODE"
          }

      - name: Summary
        if: ${{ !cancelled() }}
        run: |
          echo "## Test Integrity Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.enforcement.outcome }}" = "failure" ]; then
            echo "**FAILED: Enforcement infrastructure was tampered with.**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "The code policy enforcement files are protected and cannot be modified on PR branches." >> "$GITHUB_STEP_SUMMARY"
            echo "Fix the policy violations in your production code instead." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            if [ -f ${RUNNER_TEMP}/enforcement-report.txt ]; then
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              cat ${RUNNER_TEMP}/enforcement-report.txt >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            fi
          elif [ "${{ steps.check.outcome }}" != "success" ]; then
            echo "**FAILED: Existing tests were modified in ways that hide failures.**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Tests that exist on the base branch are the specification. If the branch breaks" >> "$GITHUB_STEP_SUMMARY"
            echo "them, the production code must be fixed — not the tests." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            if [ -f ${RUNNER_TEMP}/test-integrity-report.txt ]; then
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              cat ${RUNNER_TEMP}/test-integrity-report.txt >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "No test-hiding modifications or enforcement tampering detected." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─── Checkstyle Config Integrity Check ──────────────────────────────
  # Confirms the checkstyle configuration has not been tampered with on a
  # PR branch. checkstyle.xml is enforcement infrastructure: weakening or
  # removing rules to make violating code pass is not allowed. Any change
  # to it relative to master fails the build. If a rule genuinely needs to
  # change, open a separate PR with justification for human review.
  checkstyle-integrity-check:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.check.outcome == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin master:refs/remotes/origin/master --no-tags

      - name: Check for checkstyle config tampering
        id: check
        if: github.ref != 'refs/heads/master'
        env:
          OVERRIDE_INTEGRITY: ${{ inputs.override_integrity_checks }}
        run: |
          # The checkstyle configuration is enforcement infrastructure. Any
          # modification on a PR branch is treated as tampering and fails the
          # build.
          PROTECTED_FILES=(
            "checkstyle.xml"
          )

          TAMPERED=""
          for f in "${PROTECTED_FILES[@]}"; do
            if git diff --name-only origin/master...HEAD -- "$f" | grep -q .; then
              TAMPERED="${TAMPERED}- ${f}\n"
            fi
          done

          if [ -n "$TAMPERED" ]; then
            echo "::error::Checkstyle configuration was modified — this is not allowed on PR branches"
            echo -e "## Checkstyle Configuration Tampering Detected\n" > ${RUNNER_TEMP}/checkstyle-integrity-report.txt
            echo -e "The following protected files were modified on this branch:\n" >> ${RUNNER_TEMP}/checkstyle-integrity-report.txt
            echo -e "$TAMPERED" >> ${RUNNER_TEMP}/checkstyle-integrity-report.txt
            echo -e "\nThe checkstyle configuration enforces code quality rules. It CANNOT be" >> ${RUNNER_TEMP}/checkstyle-integrity-report.txt
            echo -e "modified on PR branches. The only way to pass the build is to fix the" >> ${RUNNER_TEMP}/checkstyle-integrity-report.txt
            echo -e "code that violates the rules — not to weaken the rules.\n" >> ${RUNNER_TEMP}/checkstyle-integrity-report.txt
            echo -e "If you believe a rule needs to change, open a separate PR with a" >> ${RUNNER_TEMP}/checkstyle-integrity-report.txt
            echo -e "justification for human review." >> ${RUNNER_TEMP}/checkstyle-integrity-report.txt
            cat ${RUNNER_TEMP}/checkstyle-integrity-report.txt
            if [ "$OVERRIDE_INTEGRITY" = "true" ]; then
              echo "::warning::Checkstyle configuration tampering detected but IGNORED via the override_integrity_checks input"
            else
              exit 1
            fi
          else
            echo "No checkstyle configuration modifications detected."
          fi

      - name: Summary
        if: ${{ !cancelled() }}
        run: |
          echo "## Checkstyle Config Integrity Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check.outcome }}" != "success" ]; then
            echo "**FAILED: The checkstyle configuration was tampered with.**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "checkstyle.xml is protected and cannot be modified on PR branches." >> "$GITHUB_STEP_SUMMARY"
            echo "Fix the code that violates the rules instead." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            if [ -f ${RUNNER_TEMP}/checkstyle-integrity-report.txt ]; then
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              cat ${RUNNER_TEMP}/checkstyle-integrity-report.txt >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "No checkstyle configuration tampering detected." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─── Deception Audit ─────────────────────────────────────────────
  # Scans the branch commit history for patterns of coordinated
  # agent deception: ping-pong modifications, test-only commits,
  # TestDepth churn, and revert-then-reapply cycles.
  # This is an informational check — it does not block the build
  # but its findings are included in the auto-resolve prompt.
  deception-audit:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/master'
    outputs:
      has_findings: ${{ steps.audit.outputs.has_findings }}
      finding_count: ${{ steps.audit.outputs.finding_count }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin master:refs/remotes/origin/master --no-tags

      - name: Run deception audit
        id: audit
        run: |
          chmod +x ./tools/ci/agent-protection/deception-audit.sh
          ./tools/ci/agent-protection/deception-audit.sh origin/master ${RUNNER_TEMP}/deception-audit-report.txt || {
            EXIT_CODE=$?
            if [ "$EXIT_CODE" -eq 2 ]; then
              echo "::warning::Deception patterns detected on this branch"
            fi
            # Do not fail the build — this is informational
            exit 0
          }

      - name: Summary
        if: ${{ !cancelled() }}
        run: |
          echo "## Deception Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.audit.outputs.has_findings }}" = "true" ]; then
            echo "**WARNING: ${{ steps.audit.outputs.finding_count }} deception pattern(s) detected.**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            if [ -f ${RUNNER_TEMP}/deception-audit-report.txt ]; then
              cat ${RUNNER_TEMP}/deception-audit-report.txt >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "No deception patterns detected." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─── Agent Commit Validation ────────────────────────────────────
  # Validates that agent commits do not modify test files or CI
  # files. This is a hard block — agent commits that violate these
  # rules are rejected. Only runs on non-master branches.
  agent-commit-validation:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/master'
    outputs:
      blocked: ${{ steps.validate.outputs.blocked }}
      block_reason: ${{ steps.validate.outputs.block_reason }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin master:refs/remotes/origin/master --no-tags

      - name: Validate agent commit
        id: validate
        run: |
          chmod +x ./tools/ci/agent-protection/validate-agent-commit.sh
          ./tools/ci/agent-protection/validate-agent-commit.sh origin/master --require-production-changes || {
            EXIT_CODE=$?
            if [ "$EXIT_CODE" -eq 2 ]; then
              echo "::error::Agent commit BLOCKED: test file modifications detected"
            elif [ "$EXIT_CODE" -eq 3 ]; then
              echo "::warning::Agent commit flagged: no production code changes"
            elif [ "$EXIT_CODE" -eq 4 ]; then
              echo "::error::Agent commit BLOCKED: CI/workflow file modifications detected"
            fi
            # Do not fail the build — the auto-resolve job checks this output
            exit 0
          }

      - name: Summary
        if: ${{ !cancelled() }}
        run: |
          echo "## Agent Commit Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.validate.outputs.blocked }}" = "true" ]; then
            echo "**BLOCKED:** ${{ steps.validate.outputs.block_reason }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Agent commit validation passed." >> "$GITHUB_STEP_SUMMARY"
          fi

  test-timeout-check:
    needs: build
    runs-on: ubuntu-latest
    # Critical path: failures block the test jobs and trigger auto-resolve.
    outputs:
      passed: ${{ steps.check.outcome == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn install -DskipTests -Dcheckstyle.skip=true

      - name: Check Test Timeouts
        id: check
        run: |
          LD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl tools \
           -Dtest=CodePolicyEnforcementTest#enforceTestTimeouts \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs"

      - name: Summary
        if: ${{ !cancelled() }}
        run: |
          echo "## Test Timeout Enforcement" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check.outcome }}" = "success" ]; then
            echo "All @Test annotations include a timeout parameter." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Some @Test annotations are missing a timeout parameter." >> "$GITHUB_STEP_SUMMARY"
            echo "Run \`mvn test -pl tools -Dtest=CodePolicyEnforcementTest#enforceTestTimeouts\` locally to see details." >> "$GITHUB_STEP_SUMMARY"
          fi

  duplicate-code-check:
    needs: build
    runs-on: ubuntu-latest
    # Critical path: failures block the test jobs and trigger auto-resolve.
    outputs:
      passed: ${{ steps.check.outcome == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn install -DskipTests -Dcheckstyle.skip=true

      - name: Check Duplicate Code
        id: check
        run: |
          LD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl tools \
           -Dtest=CodePolicyEnforcementTest#enforceNoDuplicateCode \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs"

      - name: Summary
        if: ${{ !cancelled() }}
        run: |
          echo "## Duplicate Code Detection" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check.outcome }}" = "success" ]; then
            echo "No blocks of 10+ identical lines found across different files." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Duplicate code blocks (10+ identical lines) detected across different files." >> "$GITHUB_STEP_SUMMARY"
            echo "Run \`mvn test -pl tools -Dtest=CodePolicyEnforcementTest#enforceNoDuplicateCode\` locally to see details." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─── Checkstyle Check ──────────────────────────────────────────────
  # Runs the default checkstyle rules (no var, no @SuppressWarnings)
  # as a dedicated job for clear violation reporting in the PR summary.
  checkstyle:
    needs: [changes, build]
    # Intentionally NOT gated on checkstyle-integrity-check. Correctness and
    # integrity are independent concerns: integrity protects the config from
    # unauthorized *modification* (which can be overridden when a modification
    # is legitimately intended), but a real checkstyle *violation* must ALWAYS
    # fail the pipeline. Coupling the two would let an overridden or failed
    # integrity check suppress the correctness gate, so this job runs against
    # whatever config exists on the branch regardless of the integrity result.
    if: needs.changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.check.outcome == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn install -DskipTests -Dcheckstyle.skip=true

      - name: Check exempt file lengths
        run: bash scripts/check-exempt-file-lengths.sh

      - name: Check for PDSL code in Java string literals
        run: python3 scripts/check-pdsl-in-strings.py

      - name: Check for direct System.out/err logging in test sources
        run: bash scripts/check-direct-logging.sh

      - name: Run Checkstyle
        id: check
        run: |
          # The default GitHub shell does not set pipefail, so `mvn | tee` would
          # otherwise return tee's exit code (0). exit ${PIPESTATUS[0]} propagates
          # Maven's real exit code so a violation fails this step — and, with no
          # continue-on-error, the whole job.
          mvn checkstyle:check -B 2>&1 | tee ${RUNNER_TEMP}/checkstyle-output.txt
          exit ${PIPESTATUS[0]}

      - name: Summary
        if: ${{ !cancelled() }}
        run: |
          echo "## Checkstyle" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check.outcome }}" = "success" ]; then
            echo "No checkstyle violations detected." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Checkstyle violations detected.**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -E '\[ERROR\]' ${RUNNER_TEMP}/checkstyle-output.txt >> "$GITHUB_STEP_SUMMARY" || echo "(no ERROR lines captured)" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Run \`mvn checkstyle:check\` locally to see details." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─── Python Unit Tests ─────────────────────────────────────────────
  # Runs the unittest suites that live alongside Python code under tools/.
  # Currently covers:
  #   - tools/mcp/manager/test_server.py (ar-manager MCP tools)
  #   - tools/tests/test_migrate_workstreams.py (workstreams migration tool)
  # These are pure Python — no Maven build needed, so this job only depends
  # on `changes` and runs in parallel with build/checkstyle. Fails the PR
  # when any test fails.
  python-tests:
    needs: changes
    if: needs.changes.outputs.code_changed == 'true' && needs.changes.outputs.python_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: tools/mcp/requirements.txt

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          # ar-manager server.py imports mcp.server.fastmcp at module load;
          # test_migrate_workstreams.py needs pyyaml.
          python3 -m pip install -r tools/mcp/requirements.txt pyyaml

      - name: Run ar-manager MCP tests
        run: python3 -m unittest discover -v -s tools/mcp/manager -p "test_*.py"

      - name: Run migration tool tests
        run: python3 -m unittest discover -v -s tools/tests -p "test_*.py"

  # ─── Agent Volume Isolation ────────────────────────────────────────
  # Enforces the hard invariant that FlowTree agent containers can never
  # share data through a mounted volume (a shared writable directory is both
  # a cross-workstream git-collision hazard and a data-exfiltration channel
  # between unrelated workstreams). Parses the agent docker-compose.yml and
  # fails if any two agents could share a writable source, or if any writable
  # mount targets something other than the sanctioned /agent-transcripts sink.
  #
  # Validates compose/CI configuration, not the Maven module graph, so it does
  # not participate in layer-gating. Gated on the specific files it checks
  # (agent_isolation_changed) so it is skipped — and treated as passing — when
  # none of them change. Pure Python: depends only on `changes`.
  agent-volume-isolation:
    needs: changes
    if: needs.changes.outputs.code_changed == 'true' && needs.changes.outputs.agent_isolation_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml pytest

      - name: Unit-test the validator
        working-directory: tools/ci
        run: python -m pytest test_validate_agent_volume_isolation.py -q

      - name: Validate agent volume isolation
        run: python tools/ci/validate_agent_volume_isolation.py

  # ─── Flowtree Tests ────────────────────────────────────────────────
  # Runs in parallel with the test matrix after the validation gates.
  # Extracted from `build` so that slow flowtree tests do not block the
  # rest of the pipeline.
  test-flowtree:
    needs: [changes, build, code-policy-check, test-timeout-check, duplicate-code-check, test-integrity-check]
    if: >-
      needs.build.result == 'success' &&
      needs.code-policy-check.result == 'success' &&
      needs.test-timeout-check.result == 'success' &&
      needs.duplicate-code-check.result == 'success' &&
      needs.test-integrity-check.result == 'success' &&
      needs.changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn install -DskipTests -Dcheckstyle.skip=true

      - name: Flowtree Tests
        run: |
          mvn test -Dcheckstyle.skip=true -pl flowtree/runtime \
           -DAR_HARDWARE_NATIVE_DIRECT_BUFFERS=disabled \
           -DAR_TEST_PROFILE=pipeline

      - name: Collect Coverage Data
        if: always()
        run: |
          mkdir -p coverage-data
          find . -path "*/target/jacoco.exec" -exec cp --parents {} coverage-data/ \;

      - name: Upload Coverage Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-flowtree
          path: coverage-data/
          retention-days: 1
          if-no-files-found: ignore

  test:
    needs: [changes, build, code-policy-check, test-timeout-check, duplicate-code-check, test-integrity-check]
    # Layer gate: engine tests only run when engine-or-below layers are modified
    if: >-
      needs.build.result == 'success' &&
      needs.code-policy-check.result == 'success' &&
      needs.test-timeout-check.result == 'success' &&
      needs.duplicate-code-check.result == 'success' &&
      needs.test-integrity-check.result == 'success' &&
      (needs.changes.outputs.engine_changed == 'true' ||
       needs.changes.outputs.domain_changed == 'true' ||
       needs.changes.outputs.compute_changed == 'true' ||
       needs.changes.outputs.base_changed == 'true')
    runs-on: [self-hosted, linux, ar-ci]
    # Direct ByteBuffers are GC-reclaimed, so a group can spike past the 4 GiB default before reclamation catches up.
    env:
      _JAVA_OPTIONS: -XX:MaxDirectMemorySize=16g
    strategy:
      # Let every group in the matrix run to completion even when a peer fails.
      # A failure in one group must not cancel the others: a simpler group often
      # reproduces the same problem, and cancelling hides that cheaper signal.
      # Cross-OS gating (don't run mac when linux fails) is handled by test-mac's
      # needs/if, not by fail-fast.
      fail-fast: false
      # Cap concurrent groups so all seven completing doesn't overrun runner
      # capacity; the remaining groups queue and run as slots free up.
      max-parallel: 4
      matrix:
        group: [0, 1, 2, 3, 4, 5, 6]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn install -DskipTests -Dcheckstyle.skip=true

      - name: Run Hardware Tests
        if: matrix.group == 0
        run: |
          set -o pipefail
          LD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl base/hardware \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_NATIVE_DIRECT_BUFFERS=disabled \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           2>&1 | tee "${{ runner.temp }}/mvn-hardware-test.log"

      - name: Upload Hardware Surefire Reports
        if: always() && matrix.group == 0
        uses: actions/upload-artifact@v4
        with:
          name: surefire-hardware
          path: |
            **/target/surefire-reports/TEST-*.xml
          retention-days: 7
          if-no-files-found: ignore

      - name: Run Utils Tests (Group ${{ matrix.group }})
        run: |
          set -o pipefail
          LD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl engine/utils \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_NATIVE_DIRECT_BUFFERS=disabled \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           -DAR_TEST_GROUP=${{ matrix.group }} \
           -DAR_TEST_GROUPS=7 \
           2>&1 | tee "${{ runner.temp }}/mvn-utils-test.log"

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-utils-group-${{ matrix.group }}
          path: |
            **/target/surefire-reports/TEST-*.xml
          retention-days: 7
          if-no-files-found: ignore

      - name: Run ML Tests (Group ${{ matrix.group }})
        run: |
          set -o pipefail
          LD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl engine/ml \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_NATIVE_DIRECT_BUFFERS=disabled \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           -DAR_TEST_PROFILE=pipeline \
           -DAR_TEST_GROUP=${{ matrix.group }} \
           -DAR_TEST_GROUPS=7 \
           2>&1 | tee "${{ runner.temp }}/mvn-ml-test.log"

      - name: Upload ML Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-ml-group-${{ matrix.group }}
          path: |
            **/target/surefire-reports/TEST-*.xml
          retention-days: 7
          if-no-files-found: ignore

      - name: Run Render Tests
        if: matrix.group == 0
        run: |
          set -o pipefail
          LD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl engine/render \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_NATIVE_DIRECT_BUFFERS=disabled \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           2>&1 | tee "${{ runner.temp }}/mvn-render-test.log"

      - name: Upload Render Surefire Reports
        if: always() && matrix.group == 0
        uses: actions/upload-artifact@v4
        with:
          name: surefire-render
          path: |
            **/target/surefire-reports/TEST-*.xml
          retention-days: 7
          if-no-files-found: ignore

      - name: Extract crash reports
        if: always()
        env:
          CRASH_REPORT_DIR: ${{ runner.temp }}/crash-reports
        run: |
          ./tools/ci/extract-crash-reports.sh "${{ runner.temp }}"/mvn-*.log

      - name: Upload Crash Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crash-reports-group-${{ matrix.group }}
          path: ${{ runner.temp }}/crash-reports/
          retention-days: 7
          if-no-files-found: ignore

      - name: Collect Coverage Data
        if: always()
        run: |
          mkdir -p coverage-data
          find . -path "*/target/jacoco.exec" -exec cp --parents {} coverage-data/ \;

      - name: Upload Coverage Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-group-${{ matrix.group }}
          path: coverage-data/
          retention-days: 1

  test-media:
    needs: [changes, build, code-policy-check, test-timeout-check, duplicate-code-check, test-integrity-check]
    # Layer gate: studio tests run when any layer is modified.
    if: >-
      needs.build.result == 'success' &&
      needs.code-policy-check.result == 'success' &&
      needs.test-timeout-check.result == 'success' &&
      needs.duplicate-code-check.result == 'success' &&
      needs.test-integrity-check.result == 'success' &&
      (needs.changes.outputs.studio_changed == 'true' ||
       needs.changes.outputs.extern_changed == 'true' ||
       needs.changes.outputs.engine_changed == 'true' ||
       needs.changes.outputs.domain_changed == 'true' ||
       needs.changes.outputs.compute_changed == 'true' ||
       needs.changes.outputs.base_changed == 'true')
    runs-on: [self-hosted, linux, ar-ci]
    # Cap direct memory at 8g: enough for one split group, but below runner RAM so an overshoot is a catchable limit, not an OOM kill.
    env:
      _JAVA_OPTIONS: -XX:MaxDirectMemorySize=8g
    strategy:
      # Split the (growing) media test set across two groups: each group runs half of
      # every module's tests (AR_TEST_GROUPS=2 on the steps below). Self-hosted runners
      # run one job at a time, so each group lands on its own runner with half the tests,
      # halving peak memory per runner while parallelising the suite.
      fail-fast: false
      max-parallel: 2
      matrix:
        group: [0, 1]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn install -DskipTests -Dcheckstyle.skip=true

      - name: Run Audio Tests
        run: |
          set -o pipefail
          LD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl engine/audio \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_NATIVE_DIRECT_BUFFERS=disabled \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           -DAR_TEST_PROFILE=pipeline \
           -DAR_TEST_GROUP=${{ matrix.group }} \
           -DAR_TEST_GROUPS=2 \
           2>&1 | tee "${{ runner.temp }}/mvn-audio-test.log"

      - name: Run Music Tests
        run: |
          set -o pipefail
          LD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl studio/music \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_NATIVE_DIRECT_BUFFERS=disabled \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           -DAR_TEST_PROFILE=pipeline \
           -DAR_TEST_GROUP=${{ matrix.group }} \
           -DAR_TEST_GROUPS=2 \
           2>&1 | tee "${{ runner.temp }}/mvn-music-test.log"

      - name: Run Compose Tests
        run: |
          set -o pipefail
          LD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl studio/compose \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_NATIVE_DIRECT_BUFFERS=disabled \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           -DAR_TEST_PROFILE=pipeline \
           -DAR_TEST_GROUP=${{ matrix.group }} \
           -DAR_TEST_GROUPS=2 \
           2>&1 | tee "${{ runner.temp }}/mvn-compose-test.log"

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-media-${{ matrix.group }}
          path: |
            **/target/surefire-reports/TEST-*.xml
          retention-days: 7
          if-no-files-found: ignore

      - name: Extract crash reports
        if: always()
        env:
          CRASH_REPORT_DIR: ${{ runner.temp }}/crash-reports
        run: |
          ./tools/ci/extract-crash-reports.sh "${{ runner.temp }}"/mvn-*.log

      - name: Upload Crash Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crash-reports-media-${{ matrix.group }}
          path: ${{ runner.temp }}/crash-reports/
          retention-days: 7
          if-no-files-found: ignore

      - name: Collect Coverage Data
        if: always()
        run: |
          mkdir -p coverage-data
          find . -path "*/target/jacoco.exec" -exec cp --parents {} coverage-data/ \;

      - name: Upload Coverage Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-media-${{ matrix.group }}
          path: coverage-data/
          retention-days: 1

  # ─── macOS Test Jobs ────────────────────────────────────────────────

  test-mac:
    needs: [changes, build, test]
    # Layer gate: engine tests only run when engine-or-below layers are modified.
    # Must tolerate test being skipped (no layer changes).
    if: >-
      needs.build.result == 'success' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.changes.outputs.engine_changed == 'true' ||
       needs.changes.outputs.domain_changed == 'true' ||
       needs.changes.outputs.compute_changed == 'true' ||
       needs.changes.outputs.base_changed == 'true')
    runs-on: [self-hosted, macos, ar-ci]
    strategy:
      # Let every group finish even when a peer fails (see the test job above).
      # test-mac already only runs when the linux test job succeeded/was skipped,
      # so this only affects cancellation among the mac groups themselves.
      fail-fast: false
      max-parallel: 3
      matrix:
        group: [0, 1, 2]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Isolate Maven repository per runner
        # Self-hosted macOS runners share one $HOME/.m2 (unlike the Linux jobs,
        # which Docker isolates). Concurrent workers installing the same SNAPSHOT
        # artifacts into a shared repository clobber each other. Give every runner
        # its own local repository instead. A runner executes one job at a time,
        # so this is reused across jobs on that runner — the dependency cache is
        # preserved while cross-worker pollution is eliminated. $HOME and
        # RUNNER_NAME are expanded by the shell here (a workflow-level env: would
        # not expand $HOME), and spaces in the runner name are sanitized so the
        # -D argument stays a single token.
        run: echo "MAVEN_OPTS=${MAVEN_OPTS:-} -Dmaven.repo.local=$HOME/.m2-ci/${RUNNER_NAME// /_}" >> "$GITHUB_ENV"

      - name: Build (skip tests)
        run: mvn install -DskipTests -Dcheckstyle.skip=true

      - name: Run Hardware Tests
        if: matrix.group == 0
        run: |
          DYLD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl base/hardware \
           -DAR_HARDWARE_DRIVER=* \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs"

      - name: Run Utils Tests (Group ${{ matrix.group }})
        run: |
          DYLD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl engine/utils \
           -DAR_HARDWARE_DRIVER=* \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           -DAR_TEST_GROUP=${{ matrix.group }} \
           -DAR_TEST_GROUPS=3

      - name: Run ML Tests (Group ${{ matrix.group }})
        run: |
          DYLD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl engine/ml \
           -DAR_HARDWARE_DRIVER=* \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           -DAR_TEST_PROFILE=pipeline \
           -DAR_TEST_GROUP=${{ matrix.group }} \
           -DAR_TEST_GROUPS=3

      - name: Run Render Tests
        if: matrix.group == 0
        run: |
          DYLD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl engine/render \
           -DAR_HARDWARE_DRIVER=* \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs"

  test-cl:
    needs: [changes, build, test, test-mac]
    # Duplicate of test-mac exercising the OpenCL backend: AR_HARDWARE_DRIVER
    # is native,cl (rather than *) so Metal is excluded and GPU-eligible work
    # routes through CL. Runs after test-mac (success or skipped tolerated;
    # the layer gate below matches test-mac's, so both skip together).
    if: >-
      needs.build.result == 'success' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.test-mac.result == 'success' || needs.test-mac.result == 'skipped') &&
      (needs.changes.outputs.engine_changed == 'true' ||
       needs.changes.outputs.domain_changed == 'true' ||
       needs.changes.outputs.compute_changed == 'true' ||
       needs.changes.outputs.base_changed == 'true')
    runs-on: [self-hosted, macos, ar-ci]
    # Same as test: native,cl runs the compute tests on direct-ByteBuffer native RAM
    # (no Metal), so raise the forked test JVM's direct-memory ceiling without changing
    # heap. See the test-media job for the full rationale.
    env:
      _JAVA_OPTIONS: -XX:MaxDirectMemorySize=16g
    concurrency:
      group: test-cl-${{ github.ref }}-${{ matrix.group }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      # Cap concurrency at 3 so the 7 groups do not monopolize the self-hosted
      # runners when several pipelines run at once; remaining groups queue behind.
      max-parallel: 3
      matrix:
        # More groups than test-mac (7 vs 3): the CL backend reaches its memory
        # ceiling under the larger per-group test loads (AR_HARDWARE_MEMORY_SCALE
        # is already at 7, the highest scale used anywhere), so the same tests are
        # spread across more JVMs instead.
        group: [0, 1, 2, 3, 4, 5, 6]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Isolate Maven repository per runner
        # See the identical step in test-mac for the rationale.
        run: echo "MAVEN_OPTS=${MAVEN_OPTS:-} -Dmaven.repo.local=$HOME/.m2-ci/${RUNNER_NAME// /_}" >> "$GITHUB_ENV"

      - name: Build (skip tests)
        run: mvn install -DskipTests -Dcheckstyle.skip=true

      - name: Run Hardware Tests
        if: matrix.group == 0
        run: |
          DYLD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl base/hardware \
           -DAR_HARDWARE_DRIVER=native,cl \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs"

      - name: Run Utils Tests (Group ${{ matrix.group }})
        run: |
          DYLD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl engine/utils \
           -DAR_HARDWARE_DRIVER=native,cl \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           -DAR_TEST_GROUP=${{ matrix.group }} \
           -DAR_TEST_GROUPS=7

      - name: Run ML Tests (Group ${{ matrix.group }})
        run: |
          DYLD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl engine/ml \
           -DAR_HARDWARE_DRIVER=native,cl \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           -DAR_TEST_PROFILE=pipeline \
           -DAR_TEST_GROUP=${{ matrix.group }} \
           -DAR_TEST_GROUPS=7

      - name: Run Render Tests
        if: matrix.group == 0
        run: |
          DYLD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl engine/render \
           -DAR_HARDWARE_DRIVER=native,cl \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs"

  test-media-mac:
    needs: [changes, build, test-media, code-policy-check, test-timeout-check, duplicate-code-check, test-integrity-check]
    # Layer gate: studio tests run when any layer is modified.
    # Depends on test-media rather than test-mac because test-media shares this job's
    # exact layer gate, so the two always skip or run together. That makes the skipped-
    # status matrix-propagation caveat moot: whenever this job should run, test-media
    # also ran (its success/failure propagate normally), and whenever test-media is
    # skipped this job's identical gate skips it too — regardless of test-media now
    # being a matrix.
    if: >-
      needs.build.result == 'success' &&
      needs.code-policy-check.result == 'success' &&
      needs.test-timeout-check.result == 'success' &&
      needs.duplicate-code-check.result == 'success' &&
      needs.test-integrity-check.result == 'success' &&
      (needs.test-media.result == 'success' || needs.test-media.result == 'skipped') &&
      (needs.changes.outputs.studio_changed == 'true' ||
       needs.changes.outputs.extern_changed == 'true' ||
       needs.changes.outputs.engine_changed == 'true' ||
       needs.changes.outputs.domain_changed == 'true' ||
       needs.changes.outputs.compute_changed == 'true' ||
       needs.changes.outputs.base_changed == 'true')
    runs-on: [self-hosted, macos, ar-ci]
    strategy:
      # Split the growing media test set across two groups (see test-media): each group
      # runs half of every module's tests via AR_TEST_GROUPS=2, on its own runner. This
      # job uses the Metal provider (driver *), so no direct-memory ceiling is needed.
      fail-fast: false
      max-parallel: 2
      matrix:
        group: [0, 1]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Isolate Maven repository per runner
        # Self-hosted macOS runners share one $HOME/.m2 (unlike the Linux jobs,
        # which Docker isolates). Concurrent workers installing the same SNAPSHOT
        # artifacts into a shared repository clobber each other. Give every runner
        # its own local repository instead. A runner executes one job at a time,
        # so this is reused across jobs on that runner — the dependency cache is
        # preserved while cross-worker pollution is eliminated. $HOME and
        # RUNNER_NAME are expanded by the shell here (a workflow-level env: would
        # not expand $HOME), and spaces in the runner name are sanitized so the
        # -D argument stays a single token.
        run: echo "MAVEN_OPTS=${MAVEN_OPTS:-} -Dmaven.repo.local=$HOME/.m2-ci/${RUNNER_NAME// /_}" >> "$GITHUB_ENV"

      - name: Build (skip tests)
        run: mvn install -DskipTests -Dcheckstyle.skip=true

      - name: Run Audio Tests
        run: |
          DYLD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl engine/audio \
           -DAR_HARDWARE_DRIVER=* \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           -DAR_TEST_PROFILE=pipeline \
           -DAR_TEST_GROUP=${{ matrix.group }} \
           -DAR_TEST_GROUPS=2

      - name: Run Music Tests
        run: |
          DYLD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl studio/music \
           -DAR_HARDWARE_DRIVER=* \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           -DAR_TEST_GROUP=${{ matrix.group }} \
           -DAR_TEST_GROUPS=2

      - name: Run Compose Tests
        run: |
          DYLD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl studio/compose \
           -DAR_HARDWARE_DRIVER=* \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           -DAR_TEST_PROFILE=pipeline \
           -DAR_TEST_GROUP=${{ matrix.group }} \
           -DAR_TEST_GROUPS=2

  test-media-cl:
    needs: [changes, build, test-media, test-media-mac, code-policy-check, test-timeout-check, duplicate-code-check, test-integrity-check]
    # Duplicate of test-media-mac exercising the OpenCL backend: every step runs
    # with AR_HARDWARE_DRIVER=native,cl where test-media-mac uses * (Metal
    # preferred), so GPU-eligible work routes through CL.
    # Runs after test-media-mac (success or skipped tolerated; the layer gate
    # below matches, so both skip together).
    if: >-
      needs.build.result == 'success' &&
      needs.code-policy-check.result == 'success' &&
      needs.test-timeout-check.result == 'success' &&
      needs.duplicate-code-check.result == 'success' &&
      needs.test-integrity-check.result == 'success' &&
      (needs.test-media.result == 'success' || needs.test-media.result == 'skipped') &&
      (needs.test-media-mac.result == 'success' || needs.test-media-mac.result == 'skipped') &&
      (needs.changes.outputs.studio_changed == 'true' ||
       needs.changes.outputs.extern_changed == 'true' ||
       needs.changes.outputs.engine_changed == 'true' ||
       needs.changes.outputs.domain_changed == 'true' ||
       needs.changes.outputs.compute_changed == 'true' ||
       needs.changes.outputs.base_changed == 'true')
    runs-on: [self-hosted, macos, ar-ci]
    # native,cl media tests with the native provider on JNI malloc blocks
    # (AR_HARDWARE_NATIVE_DIRECT_BUFFERS=disabled, matching the other CL jobs) so the
    # 8g direct-memory cap is spent on CL's own reservations rather than shared with
    # the native provider. Split into 3 groups since CL reserves more than the
    # 2-group budget. See test-media.
    env:
      _JAVA_OPTIONS: -XX:MaxDirectMemorySize=8g
    strategy:
      fail-fast: false
      # Cap at 2 even with 3 groups so the job does not monopolize the runners.
      max-parallel: 2
      matrix:
        group: [0, 1, 2]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Isolate Maven repository per runner
        # See the identical step in test-mac for the rationale.
        run: echo "MAVEN_OPTS=${MAVEN_OPTS:-} -Dmaven.repo.local=$HOME/.m2-ci/${RUNNER_NAME// /_}" >> "$GITHUB_ENV"

      - name: Build (skip tests)
        run: mvn install -DskipTests -Dcheckstyle.skip=true

      - name: Run Audio Tests
        run: |
          DYLD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl engine/audio \
           -DAR_HARDWARE_DRIVER=native,cl \
           -DAR_HARDWARE_NATIVE_DIRECT_BUFFERS=disabled \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           -DAR_TEST_PROFILE=pipeline \
           -DAR_TEST_GROUP=${{ matrix.group }} \
           -DAR_TEST_GROUPS=3

      - name: Run Music Tests
        run: |
          DYLD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl studio/music \
           -DAR_HARDWARE_DRIVER=native,cl \
           -DAR_HARDWARE_NATIVE_DIRECT_BUFFERS=disabled \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           -DAR_TEST_GROUP=${{ matrix.group }} \
           -DAR_TEST_GROUPS=3

      - name: Run Compose Tests
        run: |
          DYLD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -Dcheckstyle.skip=true -pl studio/compose \
           -DAR_HARDWARE_DRIVER=native,cl \
           -DAR_HARDWARE_NATIVE_DIRECT_BUFFERS=disabled \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           -DAR_TEST_PROFILE=pipeline \
           -DAR_TEST_GROUP=${{ matrix.group }} \
           -DAR_TEST_GROUPS=3

  analysis:
    needs: [build, test, test-flowtree, test-media]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build for Analysis
        run: mvn install -DskipTests -Dcheckstyle.skip=true

      - name: Download All Coverage Data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: all-coverage

      - name: Merge Coverage Data
        run: |
          # Ensure the directory exists even when no coverage artifacts were uploaded
          # (e.g. when test jobs were skipped on this branch).
          mkdir -p all-coverage

          # Find all jacoco.exec files and create a file list
          find all-coverage -name "jacoco.exec" > exec-files.txt
          echo "Found coverage files:"
          cat exec-files.txt

          # Create merged coverage directory
          mkdir -p .qodana/code-coverage

          # Use JaCoCo CLI to merge all exec files
          if [ -s exec-files.txt ]; then
            # Download JaCoCo CLI
            JACOCO_VERSION=0.8.11
            curl -sL -o jacoco-cli.zip \
              "https://repo1.maven.org/maven2/org/jacoco/jacoco/$JACOCO_VERSION/jacoco-$JACOCO_VERSION.zip"
            unzip -q jacoco-cli.zip -d jacoco-cli

            # Merge all exec files
            java -jar jacoco-cli/lib/jacococli.jar merge \
              $(cat exec-files.txt | tr '\n' ' ') \
              --destfile merged-jacoco.exec

            # Generate XML report for Qodana
            # Need to specify all class directories (each as separate --classfiles arg)
            java -jar jacoco-cli/lib/jacococli.jar report merged-jacoco.exec \
              $(find . -path "*/target/classes" -type d -exec echo --classfiles {} \;) \
              $(find . -path "*/src/main/java" -type d -exec echo --sourcefiles {} \;) \
              --xml .qodana/code-coverage/coverage.xml \
              --html .qodana/code-coverage/html

            echo "Coverage report generated at .qodana/code-coverage/"
          else
            echo "No coverage files found"
          fi

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .qodana/code-coverage/
          retention-days: 30

      # Qodana DISABLED: the Qodana product has been cancelled and the scan was
      # failing the whole analysis job. Re-enable by uncommenting both steps
      # below once a replacement (or a renewed Qodana subscription) is in place.
      #
      # Qodana runs as part of this job (rather than a separate one) so it
      # analyzes the same workspace the coverage was just merged into: the
      # report at .qodana/code-coverage/coverage.xml is picked up directly,
      # and we avoid a redundant checkout and `mvn install`.
      # - name: Qodana Scan
      #   uses: JetBrains/qodana-action@main
      #   env:
      #     QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
      #   with:
      #     ref: ${{ github.event.pull_request.head.sha }}
      #     fetch-depth: 0
      #     args: "-i,.,--linter,jetbrains/qodana-jvm"
      #     pr-mode: false

      # Uploading the Qodana SARIF to GitHub code scanning is best-effort: the
      # report regularly exceeds code scanning's 25,000-results-per-run limit and
      # is rejected, and the merge-commit ref it resolves is not always present.
      # Neither failure should fail the analysis job, so this step is allowed to
      # fail. Pinned to the CodeQL Action v4 (v3 is deprecated as of Dec 2026).
      # Disabled alongside the Qodana Scan above — there is no SARIF to upload
      # without it.
      # - name: Github Scan
      #   continue-on-error: true
      #   uses: github/codeql-action/upload-sarif@v4
      #   with:
      #     sarif_file: ${{ runner.temp }}/qodana/results/qodana.sarif.json

  # ─── Auto-Resolve Job ─────────────────────────────────────────────────
  # Downloads Surefire reports from all test jobs, parses them for failures,
  # decides which prompt to build, and STAGES a FlowTree coding-agent request
  # as an artifact. The environment-gated controller submission happens in the
  # separate "Auto-Resolve Submit" workflow
  # (.github/workflows/auto-resolve-submit.yaml).
  #
  # Why the submission is not performed here: it is gated on the `worker`
  # GitHub Environment (required-reviewers). A job carrying `environment:` in a
  # pull_request run attaches a deployment status to the PR head commit; an
  # abandoned/cancelled `worker` deployment then surfaces as a spurious "had a
  # problem deploying" red X on the PR. Submitting from a workflow_run workflow
  # keeps that deployment status off the pull request while preserving the
  # approval gate.
  #
  # Concurrency note: GitHub Actions does not natively support "skip if
  # already running" semantics. The concurrency group below ensures only
  # one auto-resolve prepare job runs per branch at a time. If a new run is
  # triggered while one is pending (queued), the pending one is cancelled
  # in favor of the newer run. A truly running job will block the new one
  # from starting until it completes.

  auto-resolve:
    needs: [changes, build, test, test-flowtree, test-media, code-policy-check, test-timeout-check, duplicate-code-check, test-integrity-check, deception-audit, agent-commit-validation, checkstyle, analysis]
    if: ${{ !cancelled() && github.ref != 'refs/heads/master' }}
    runs-on: ubuntu-latest
    concurrency:
      group: auto-resolve-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Check build result
        id: build-check
        run: |
          if [ "${{ needs.changes.outputs.code_changed }}" = "false" ]; then
            echo "build_failed=false" >> "$GITHUB_OUTPUT"
            echo "docs_only_skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Build skipped — docs-only change"
          elif [ "${{ needs.build.result }}" != "success" ]; then
            echo "build_failed=true" >> "$GITHUB_OUTPUT"
            echo "docs_only_skip=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Build failed — treating as total test failure"
          else
            echo "build_failed=false" >> "$GITHUB_OUTPUT"
            echo "docs_only_skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine branch context
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "branch=${{ github.head_ref }}" >> "$GITHUB_OUTPUT"
            echo "base=${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "base=master" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for docs-only changes
        id: docs-check
        run: |
          CHANGED_FILES=$(git diff --name-only origin/${{ steps.ctx.outputs.base }}...${{ steps.ctx.outputs.head_sha }} || true)
          if [ -z "$CHANGED_FILES" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NON_DOCS=$(echo "$CHANGED_FILES" | grep -v '^docs/' || true)
          if [ -z "$NON_DOCS" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "::notice::All changes are under docs/ — will use verify prompt instead of review"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Build failure path ──────────────────────────────────────
      # When the build itself fails, no tests run. Submit an agent
      # job to fix the compilation error directly.

      - name: Build prompt (build failure)
        if: steps.build-check.outputs.build_failed == 'true'
        env:
          BRANCH: ${{ steps.ctx.outputs.branch }}
          COMMIT_SHA: ${{ steps.ctx.outputs.head_sha }}

        run: |
          ./tools/ci/prompts/build-build-failure-prompt.sh "${{ runner.temp }}/agent-prompt.txt"

      - name: Stage submit request (build failure)
        if: steps.build-check.outputs.build_failed == 'true'
        env:
          BRANCH: ${{ steps.ctx.outputs.branch }}
          BASE_BRANCH: ${{ steps.ctx.outputs.base }}
          STARTED_AFTER: ${{ needs.changes.outputs.started_at }}
          DESCRIPTION: "Resolve build failure"
        run: |
          ./tools/ci/stage-submit-request.sh "${{ runner.temp }}/agent-prompt.txt" auto-resolve-request

      # ── Test failure path ───────────────────────────────────────
      # When the build succeeded, download and parse Surefire reports.
      # Only linux test results are considered — test-mac failures are
      # not treated as requiring auto-resolution.

      - name: Clean stale surefire reports
        if: steps.build-check.outputs.build_failed != 'true'
        run: |
          # Defensive cleanup so locally-produced surefire reports cannot
          # contaminate the artifact download directory. On the ephemeral
          # ubuntu-latest runner the workspace starts clean, so this is
          # effectively a no-op, but it is kept as a guard.
          find . -path "*/target/surefire-reports" -type d -exec rm -rf {} + 2>/dev/null || true
          rm -rf all-surefire-reports

      - name: Download Surefire Reports
        if: steps.build-check.outputs.build_failed != 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: surefire-*
          path: all-surefire-reports
          merge-multiple: false

      - name: Download Crash Reports
        if: steps.build-check.outputs.build_failed != 'true'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: crash-reports-*
          path: all-crash-reports
          merge-multiple: true

      - name: Filter to linux-only surefire reports
        if: steps.build-check.outputs.build_failed != 'true'
        run: |
          # Only keep artifacts from known linux test jobs:
          #   surefire-utils-group-*, surefire-ml-group-*, surefire-media
          # Remove any unexpected directories (e.g., if a mac job ever
          # starts uploading surefire artifacts).
          mkdir -p all-surefire-reports
          for dir in all-surefire-reports/*/; do
            base=$(basename "$dir")
            case "$base" in
              surefire-utils-group-*|surefire-ml-group-*|surefire-media)
                echo "::notice::Keeping linux surefire artifact: $base"
                ;;
              *)
                echo "::warning::Removing non-linux surefire artifact: $base"
                rm -rf "$dir"
                ;;
            esac
          done

      - name: Parse test failures
        if: steps.build-check.outputs.build_failed != 'true'
        id: failures
        run: |
          eval "$(./tools/ci/parse-surefire-failures.sh all-surefire-reports "${{ runner.temp }}/test-failures.txt")"
          echo "failure_count=$failure_count" >> "$GITHUB_OUTPUT"
          echo "has_failures=$has_failures" >> "$GITHUB_OUTPUT"
          if [ "$has_failures" = "true" ]; then
            echo "::notice::Found $failure_count test failure(s) to auto-resolve"
          else
            echo "::notice::No test failures found"
          fi

      - name: Check for incomplete test execution
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true'
        id: test-completeness
        run: |
          # A job result of "failure" means the job ran and hit a real error
          # (e.g., JVM crash, OOM, build error within the test step) even though
          # no surefire XML was produced. This is a genuine failure, not
          # "incomplete" testing. Treat it like a build failure.
          #
          # A job result of "cancelled" means GitHub cancelled the job because
          # an upstream dependency failed (fail-fast). If the upstream that
          # failed is "test" itself (result=failure), the cancellation of
          # test-media is expected collateral — not a separate incompleteness.
          #
          # "Incomplete" means a job was cancelled/skipped with NO upstream
          # failure to explain it (e.g., infrastructure issue, concurrency
          # cancellation).
          INCOMPLETE="false"
          HAS_REAL_FAILURE="false"

          TEST_RESULT="${{ needs.test.result }}"
          MEDIA_RESULT="${{ needs.test-media.result }}"
          echo "::notice::test job result: ${TEST_RESULT}, test-media job result: ${MEDIA_RESULT}"

          # Check for genuine failures (job ran but failed without surefire XML)
          if [ "$TEST_RESULT" = "failure" ]; then
            HAS_REAL_FAILURE="true"
            echo "::warning::test job failed without producing parseable surefire failures — treating as build failure"
          fi
          if [ "$MEDIA_RESULT" = "failure" ]; then
            HAS_REAL_FAILURE="true"
            echo "::warning::test-media job failed without producing parseable surefire failures — treating as build failure"
          fi

          # If a real failure occurred, route to the build-failure path
          # (not the incomplete path) by setting build_failed retroactively
          if [ "$HAS_REAL_FAILURE" = "true" ]; then
            echo "build_failed_in_tests=true" >> "$GITHUB_OUTPUT"
            echo "incomplete=$INCOMPLETE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check whether any validation gate that "test" depends on has
          # failed.  When a gate fails the test job is skipped by GitHub
          # Actions (dependency not met).  That skip is *explained* — it
          # is not an infrastructure-level incompleteness.  The validation
          # failures have their own resolution paths downstream (code
          # policy, quality gates).
          VALIDATION_FAILED="false"
          if [ "${{ needs.code-policy-check.outputs.passed }}" != "true" ]; then
            VALIDATION_FAILED="true"
          fi
          if [ "${{ needs.test-timeout-check.outputs.passed }}" != "true" ]; then
            VALIDATION_FAILED="true"
          fi
          if [ "${{ needs.duplicate-code-check.outputs.passed }}" != "true" ]; then
            VALIDATION_FAILED="true"
          fi
          if [ "${{ needs.test-integrity-check.outputs.passed }}" != "true" ]; then
            VALIDATION_FAILED="true"
          fi

          # Determine whether layer-based filtering explains a skipped test job.
          # Engine tests (test, test-mac) only run when engine-or-below layers change.
          ENGINE_LAYERS_CHANGED="false"
          if [ "${{ needs.changes.outputs.engine_changed }}" = "true" ] || \
             [ "${{ needs.changes.outputs.domain_changed }}" = "true" ] || \
             [ "${{ needs.changes.outputs.compute_changed }}" = "true" ] || \
             [ "${{ needs.changes.outputs.base_changed }}" = "true" ]; then
            ENGINE_LAYERS_CHANGED="true"
          fi

          # Studio tests (test-media, test-media-mac) run when any layer changes.
          ANY_LAYER_CHANGED="false"
          if [ "$ENGINE_LAYERS_CHANGED" = "true" ] || \
             [ "${{ needs.changes.outputs.extern_changed }}" = "true" ] || \
             [ "${{ needs.changes.outputs.studio_changed }}" = "true" ]; then
            ANY_LAYER_CHANGED="true"
          fi

          # Only flag as incomplete if jobs were cancelled/skipped without
          # an upstream failure or layer-based filtering to explain it
          if [ "$TEST_RESULT" = "cancelled" ] || [ "$TEST_RESULT" = "skipped" ]; then
            if [ "$VALIDATION_FAILED" = "true" ]; then
              echo "::notice::test job was ${TEST_RESULT} because an upstream validation check failed — not treating as incomplete"
            elif [ "$ENGINE_LAYERS_CHANGED" = "false" ]; then
              echo "::notice::test job was ${TEST_RESULT} due to layer-based filtering (no engine-or-below changes) — not treating as incomplete"
            else
              echo "::warning::test job was ${TEST_RESULT} without an upstream failure"
              INCOMPLETE="true"
            fi
          fi
          if [ "$MEDIA_RESULT" = "cancelled" ] || [ "$MEDIA_RESULT" = "skipped" ]; then
            # test-media cancelled because test failed/skipped is expected, not incomplete
            if [ "$TEST_RESULT" != "failure" ] && [ "$TEST_RESULT" != "skipped" ]; then
              if [ "$VALIDATION_FAILED" = "true" ]; then
                echo "::notice::test-media job was ${MEDIA_RESULT} because an upstream validation check failed — not treating as incomplete"
              elif [ "$ANY_LAYER_CHANGED" = "false" ]; then
                echo "::notice::test-media job was ${MEDIA_RESULT} due to layer-based filtering (no layer changes) — not treating as incomplete"
              else
                echo "::warning::test-media job was ${MEDIA_RESULT} without test job failure"
                INCOMPLETE="true"
              fi
            fi
          fi
          echo "incomplete=$INCOMPLETE" >> "$GITHUB_OUTPUT"

      - name: Upload failure summary
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-summary
          path: ${{ runner.temp }}/test-failures.txt
          retention-days: 7

      - name: Build prompt (test failures)
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures == 'true'
        env:
          FAILURE_COUNT: ${{ steps.failures.outputs.failure_count }}
          BRANCH: ${{ steps.ctx.outputs.branch }}
          COMMIT_SHA: ${{ steps.ctx.outputs.head_sha }}

        run: |
          ./tools/ci/prompts/build-resolve-prompt.sh "${{ runner.temp }}/test-failures.txt" "${{ runner.temp }}/agent-prompt.txt"

      - name: Stage submit request (test failures)
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures == 'true'
        env:
          BRANCH: ${{ steps.ctx.outputs.branch }}
          BASE_BRANCH: ${{ steps.ctx.outputs.base }}
          PROTECT_TEST_FILES: "true"
          ENFORCE_CHANGES: "true"
          STARTED_AFTER: ${{ needs.changes.outputs.started_at }}
          DESCRIPTION: "Resolve ${{ steps.failures.outputs.failure_count }} test failure(s)"
        run: |
          ./tools/ci/stage-submit-request.sh "${{ runner.temp }}/agent-prompt.txt" auto-resolve-request

      # ── Test job failure without surefire XML ──────────────────────
      # When a test job had result "failure" but no surefire failures
      # were parsed (e.g., JVM OOM, SIGABRT, native crash), use the
      # crash-specific prompt with Maven output and dumpstream details.

      - name: Build prompt (test job crash)
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.test-completeness.outputs.build_failed_in_tests == 'true'
        env:
          BRANCH: ${{ steps.ctx.outputs.branch }}
          COMMIT_SHA: ${{ steps.ctx.outputs.head_sha }}

        run: |
          ./tools/ci/prompts/build-vm-crash-prompt.sh all-crash-reports "${{ runner.temp }}/agent-prompt.txt"

      - name: Stage submit request (test job crash)
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.test-completeness.outputs.build_failed_in_tests == 'true'
        env:
          BRANCH: ${{ steps.ctx.outputs.branch }}
          BASE_BRANCH: ${{ steps.ctx.outputs.base }}
          PROTECT_TEST_FILES: "true"
          ENFORCE_CHANGES: "true"
          STARTED_AFTER: ${{ needs.changes.outputs.started_at }}
          DESCRIPTION: "Resolve JVM crash in test execution"
        run: |
          ./tools/ci/stage-submit-request.sh "${{ runner.temp }}/agent-prompt.txt" auto-resolve-request

      # ── Incomplete test execution path ─────────────────────────────
      # When test jobs were cancelled or skipped without any upstream
      # failure to explain it (e.g., infrastructure issue, concurrency
      # cancellation). Jobs cancelled because an upstream job failed
      # are NOT considered incomplete — that's expected fail-fast.

      - name: Build prompt (incomplete tests)
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.test-completeness.outputs.build_failed_in_tests != 'true' && steps.test-completeness.outputs.incomplete == 'true'
        env:
          BRANCH: ${{ steps.ctx.outputs.branch }}
          COMMIT_SHA: ${{ steps.ctx.outputs.head_sha }}

        run: |
          ./tools/ci/prompts/build-build-failure-prompt.sh "${{ runner.temp }}/agent-prompt.txt"

      - name: Stage submit request (incomplete tests)
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.test-completeness.outputs.build_failed_in_tests != 'true' && steps.test-completeness.outputs.incomplete == 'true'
        env:
          BRANCH: ${{ steps.ctx.outputs.branch }}
          BASE_BRANCH: ${{ steps.ctx.outputs.base }}
          STARTED_AFTER: ${{ needs.changes.outputs.started_at }}
          DESCRIPTION: "Investigate incomplete test execution"
        run: |
          ./tools/ci/stage-submit-request.sh "${{ runner.temp }}/agent-prompt.txt" auto-resolve-request

      # ── Quality gate fallback ──────────────────────────────────────
      # When no test failures exist, check quality gates and submit
      # those for auto-resolution instead. This ensures style and
      # reusability issues are addressed only after correctness.

      # ── Code policy violation path ────────────────────────────────
      # When code policy enforcement failed, use the dedicated prompt
      # that explains the policies and forbids circumvention.

      - name: Build prompt (code policy violations)
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.test-completeness.outputs.incomplete != 'true' && steps.test-completeness.outputs.build_failed_in_tests != 'true' && needs.code-policy-check.outputs.passed != 'true'
        env:
          BRANCH: ${{ steps.ctx.outputs.branch }}
          COMMIT_SHA: ${{ steps.ctx.outputs.head_sha }}

        run: |
          chmod +x ./tools/ci/prompts/build-policy-violation-prompt.sh
          ./tools/ci/prompts/build-policy-violation-prompt.sh "${{ runner.temp }}/agent-prompt.txt"

      - name: Stage submit request (code policy violations)
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.test-completeness.outputs.incomplete != 'true' && steps.test-completeness.outputs.build_failed_in_tests != 'true' && needs.code-policy-check.outputs.passed != 'true'
        env:
          BRANCH: ${{ steps.ctx.outputs.branch }}
          BASE_BRANCH: ${{ steps.ctx.outputs.base }}
          STARTED_AFTER: ${{ needs.changes.outputs.started_at }}
          DESCRIPTION: "Resolve code policy violations"
        run: |
          ./tools/ci/stage-submit-request.sh "${{ runner.temp }}/agent-prompt.txt" auto-resolve-request

      # ── Other quality gate fallback ──────────────────────────────
      # When no test failures or policy violations exist, check
      # remaining quality gates.

      - name: Check quality gates
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.test-completeness.outputs.incomplete != 'true' && steps.test-completeness.outputs.build_failed_in_tests != 'true' && needs.code-policy-check.outputs.passed == 'true'
        id: quality
        env:
          TIMEOUT_PASSED: ${{ needs.test-timeout-check.outputs.passed }}
          DUPLICATE_PASSED: ${{ needs.duplicate-code-check.outputs.passed }}
          TEST_INTEGRITY_PASSED: ${{ needs.test-integrity-check.outputs.passed }}
          AGENT_COMMIT_BLOCKED: ${{ needs.agent-commit-validation.outputs.blocked }}
          AGENT_BLOCK_REASON: ${{ needs.agent-commit-validation.outputs.block_reason }}
          DECEPTION_AUDIT_FINDINGS: ${{ needs.deception-audit.outputs.has_findings }}
          DECEPTION_FINDING_COUNT: ${{ needs.deception-audit.outputs.finding_count }}
          CHECKSTYLE_PASSED: ${{ needs.checkstyle.outputs.passed }}
        run: |
          ./tools/ci/agent-protection/check-quality-gates.sh "${{ runner.temp }}/quality-gate-failures.txt"

      - name: Upload quality gate summary
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.quality.outputs.has_failures == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-summary
          path: ${{ runner.temp }}/quality-gate-failures.txt
          retention-days: 7

      - name: Build prompt (quality gates)
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.quality.outputs.has_failures == 'true'
        env:
          FAILURE_COUNT: ${{ steps.quality.outputs.failure_count }}
          BRANCH: ${{ steps.ctx.outputs.branch }}
          COMMIT_SHA: ${{ steps.ctx.outputs.head_sha }}

        run: |
          ./tools/ci/prompts/build-quality-gate-prompt.sh "${{ runner.temp }}/quality-gate-failures.txt" "${{ runner.temp }}/agent-prompt.txt"

      - name: Stage submit request (quality gates)
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.quality.outputs.has_failures == 'true'
        env:
          BRANCH: ${{ steps.ctx.outputs.branch }}
          BASE_BRANCH: ${{ steps.ctx.outputs.base }}
          STARTED_AFTER: ${{ needs.changes.outputs.started_at }}
          DESCRIPTION: "Resolve quality gate failures"
        run: |
          ./tools/ci/stage-submit-request.sh "${{ runner.temp }}/agent-prompt.txt" auto-resolve-request

      # ── Docs-only verify path ──────────────────────────────────
      # When all changes are under docs/, skip the general review
      # and use the verify-completion prompt instead, since these
      # are typically plan documents for a workstream.

      - name: Build prompt (docs-only verify)
        if: (steps.build-check.outputs.docs_only_skip == 'true') || (steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.test-completeness.outputs.incomplete != 'true' && steps.test-completeness.outputs.build_failed_in_tests != 'true' && needs.code-policy-check.outputs.passed == 'true' && steps.quality.outputs.has_failures != 'true' && steps.docs-check.outputs.docs_only == 'true')
        env:
          BRANCH: ${{ steps.ctx.outputs.branch }}
          BASE_BRANCH: ${{ steps.ctx.outputs.base }}
          COMMIT_SHA: ${{ steps.ctx.outputs.head_sha }}
        run: |
          chmod +x ./tools/ci/prompts/build-verify-prompt.sh
          ./tools/ci/prompts/build-verify-prompt.sh "${{ runner.temp }}/agent-prompt.txt"

      - name: Stage submit request (docs-only verify)
        if: (steps.build-check.outputs.docs_only_skip == 'true') || (steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.test-completeness.outputs.incomplete != 'true' && steps.test-completeness.outputs.build_failed_in_tests != 'true' && needs.code-policy-check.outputs.passed == 'true' && steps.quality.outputs.has_failures != 'true' && steps.docs-check.outputs.docs_only == 'true')
        env:
          BRANCH: ${{ steps.ctx.outputs.branch }}
          BASE_BRANCH: ${{ steps.ctx.outputs.base }}
          STARTED_AFTER: ${{ needs.changes.outputs.started_at }}
          DESCRIPTION: "Verify docs changes"
        run: |
          ./tools/ci/stage-submit-request.sh "${{ runner.temp }}/agent-prompt.txt" auto-resolve-request

      # ── General review fallback ─────────────────────────────────
      # When all tests and quality gates pass, submit a general
      # review job covering design, test quality, correctness,
      # documentation, and consistency with existing patterns.

      - name: Build prompt (general review)
        if: steps.build-check.outputs.docs_only_skip != 'true' && steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.test-completeness.outputs.incomplete != 'true' && steps.test-completeness.outputs.build_failed_in_tests != 'true' && needs.code-policy-check.outputs.passed == 'true' && steps.quality.outputs.has_failures != 'true' && steps.docs-check.outputs.docs_only != 'true'
        env:
          BRANCH: ${{ steps.ctx.outputs.branch }}
          BASE_BRANCH: ${{ steps.ctx.outputs.base }}
          COMMIT_SHA: ${{ steps.ctx.outputs.head_sha }}
        run: |
          ./tools/ci/prompts/build-review-prompt.sh "${{ runner.temp }}/agent-prompt.txt"

      - name: Stage submit request (general review)
        if: steps.build-check.outputs.docs_only_skip != 'true' && steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.test-completeness.outputs.incomplete != 'true' && steps.test-completeness.outputs.build_failed_in_tests != 'true' && needs.code-policy-check.outputs.passed == 'true' && steps.quality.outputs.has_failures != 'true' && steps.docs-check.outputs.docs_only != 'true'
        env:
          BRANCH: ${{ steps.ctx.outputs.branch }}
          BASE_BRANCH: ${{ steps.ctx.outputs.base }}
          STARTED_AFTER: ${{ needs.changes.outputs.started_at }}
          DESCRIPTION: "Review branch changes"
        run: |
          ./tools/ci/stage-submit-request.sh "${{ runner.temp }}/agent-prompt.txt" auto-resolve-request

      - name: Upload auto-resolve request
        if: ${{ !cancelled() && inputs.auto_resolve != 'false' && hashFiles('auto-resolve-request/submit.env') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: auto-resolve-request
          path: auto-resolve-request/
          retention-days: 1

      - name: Summary
        if: ${{ !cancelled() }}
        run: |
          echo "## Auto-Resolve" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_The request below is staged as an artifact; the \`Auto-Resolve Submit\` workflow submits it to the controller after the \`worker\` environment approval._" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.build-check.outputs.docs_only_skip }}" = "true" ]; then
            echo "**Docs-only change** — test pipeline was skipped." >> "$GITHUB_STEP_SUMMARY"
            echo "A FlowTree coding agent job was submitted to verify docs changes." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.build-check.outputs.build_failed }}" = "true" ]; then
            echo "**Build failed** — no tests were able to run." >> "$GITHUB_STEP_SUMMARY"
            echo "A FlowTree coding agent job was submitted to fix the build." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.failures.outputs.has_failures }}" = "true" ]; then
            echo "Found **${{ steps.failures.outputs.failure_count }}** test failure(s)." >> "$GITHUB_STEP_SUMMARY"
            echo "A FlowTree coding agent job was submitted to attempt automatic resolution." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Failing tests" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat "${{ runner.temp }}/test-failures.txt" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "(no failure file)" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.test-completeness.outputs.build_failed_in_tests }}" = "true" ]; then
            echo "**Test job failed** without producing surefire results (JVM crash, OOM, or build error within test step)." >> "$GITHUB_STEP_SUMMARY"
            echo "A FlowTree coding agent job was submitted to resolve the failure." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.test-completeness.outputs.incomplete }}" = "true" ]; then
            echo "**Test execution incomplete** — some test jobs were cancelled or skipped without an upstream failure to explain it." >> "$GITHUB_STEP_SUMMARY"
            echo "A FlowTree coding agent job was submitted to investigate." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ needs.code-policy-check.outputs.passed }}" != "true" ]; then
            echo "**Code policy violations detected.**" >> "$GITHUB_STEP_SUMMARY"
            echo "A FlowTree coding agent job was submitted with a dedicated policy violation prompt." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.quality.outputs.has_failures }}" = "true" ]; then
            echo "No test failures. Found **${{ steps.quality.outputs.failure_count }}** quality gate failure(s)." >> "$GITHUB_STEP_SUMMARY"
            echo "A FlowTree coding agent job was submitted to resolve quality issues." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Failing quality gates" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat "${{ runner.temp }}/quality-gate-failures.txt" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "(no failure file)" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.docs-check.outputs.docs_only }}" = "true" ]; then
            echo "All changes are under \`docs/\` — docs-only PR detected." >> "$GITHUB_STEP_SUMMARY"
            echo "A FlowTree coding agent job was submitted to verify docs changes." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "All tests and quality gates passed." >> "$GITHUB_STEP_SUMMARY"
            echo "A FlowTree coding agent job was submitted for general review." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─── Merge Gate ───────────────────────────────────────────────────────
  # Single required branch-protection check. Passes when every job that
  # ran for this pipeline completed successfully. Skipped jobs (due to
  # layer filtering or docs-only optimisation) are treated as passing.
  # auto-resolve is intentionally excluded — it is a background automation
  # task, not a quality signal.
  #
  # Configure this as the ONLY required status check under:
  #   Settings → Branches → Branch protection rules → Require status checks
  #   Status check name: "All Checks"
  all-checks:
    name: All Checks
    needs:
      - changes
      - build
      - code-policy-check
      - test-integrity-check
      - checkstyle-integrity-check
      - deception-audit
      - agent-commit-validation
      - test-timeout-check
      - duplicate-code-check
      - checkstyle
      - python-tests
      - agent-volume-isolation
      - test-flowtree
      - test
      - test-media
      - test-mac
      - test-media-mac
      - analysis
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate pipeline results
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          CODE_POLICY_RESULT: ${{ needs.code-policy-check.result }}
          TEST_INTEGRITY_RESULT: ${{ needs.test-integrity-check.result }}
          CHECKSTYLE_INTEGRITY_RESULT: ${{ needs.checkstyle-integrity-check.result }}
          DECEPTION_AUDIT_RESULT: ${{ needs.deception-audit.result }}
          AGENT_COMMIT_RESULT: ${{ needs.agent-commit-validation.result }}
          TEST_TIMEOUT_RESULT: ${{ needs.test-timeout-check.result }}
          DUPLICATE_CODE_RESULT: ${{ needs.duplicate-code-check.result }}
          CHECKSTYLE_RESULT: ${{ needs.checkstyle.result }}
          CHECKSTYLE_PASSED: ${{ needs.checkstyle.outputs.passed }}
          PYTHON_TESTS_RESULT: ${{ needs.python-tests.result }}
          AGENT_VOLUME_ISOLATION_RESULT: ${{ needs.agent-volume-isolation.result }}
          TEST_FLOWTREE_RESULT: ${{ needs.test-flowtree.result }}
          TEST_RESULT: ${{ needs.test.result }}
          TEST_MEDIA_RESULT: ${{ needs.test-media.result }}
          TEST_MAC_RESULT: ${{ needs.test-mac.result }}
          TEST_MEDIA_MAC_RESULT: ${{ needs.test-media-mac.result }}
          ANALYSIS_RESULT: ${{ needs.analysis.result }}
        run: |
          FAILED=""

          # Checks a single job result.
          # success or skipped → pass; failure or cancelled → fail.
          check_job() {
            local name="$1"
            local result="$2"
            case "$result" in
              success|skipped) : ;;
              failure|cancelled)
                FAILED="${FAILED} ${name}"
                echo "::error::${name} result: ${result}" ;;
              *)
                echo "::notice::${name} result: ${result} (unexpected — treating as failure)"
                FAILED="${FAILED} ${name}" ;;
            esac
          }

          check_job "build"                   "$BUILD_RESULT"
          check_job "changes"                 "$CHANGES_RESULT"
          check_job "code-policy-check"       "$CODE_POLICY_RESULT"
          check_job "test-integrity-check"    "$TEST_INTEGRITY_RESULT"
          check_job "checkstyle-integrity-check" "$CHECKSTYLE_INTEGRITY_RESULT"
          check_job "deception-audit"         "$DECEPTION_AUDIT_RESULT"
          check_job "agent-commit-validation" "$AGENT_COMMIT_RESULT"
          check_job "test-timeout-check"      "$TEST_TIMEOUT_RESULT"
          check_job "duplicate-code-check"    "$DUPLICATE_CODE_RESULT"
          check_job "python-tests"            "$PYTHON_TESTS_RESULT"
          check_job "agent-volume-isolation"  "$AGENT_VOLUME_ISOLATION_RESULT"
          check_job "test-flowtree"           "$TEST_FLOWTREE_RESULT"
          check_job "test"                    "$TEST_RESULT"
          check_job "test-media"              "$TEST_MEDIA_RESULT"
          check_job "test-mac"                "$TEST_MAC_RESULT"
          check_job "test-media-mac"          "$TEST_MEDIA_MAC_RESULT"
          check_job "analysis"                "$ANALYSIS_RESULT"

          # checkstyle now fails hard (no continue-on-error), so its job result
          # is authoritative — evaluate it like any other job.
          check_job "checkstyle"              "$CHECKSTYLE_RESULT"

          if [ -n "$FAILED" ]; then
            echo "::error::The following jobs failed:${FAILED}"
            exit 1
          fi
          echo "All pipeline jobs completed successfully or were intentionally skipped."

      - name: Summary
        if: ${{ !cancelled() }}
        run: |
          echo "## Merge Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| changes | ${{ needs.changes.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| build | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| code-policy-check | ${{ needs.code-policy-check.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| test-integrity-check | ${{ needs.test-integrity-check.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| checkstyle-integrity-check | ${{ needs.checkstyle-integrity-check.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| deception-audit | ${{ needs.deception-audit.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agent-commit-validation | ${{ needs.agent-commit-validation.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| test-timeout-check | ${{ needs.test-timeout-check.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| duplicate-code-check | ${{ needs.duplicate-code-check.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| checkstyle | ${{ needs.checkstyle.result }} (passed=${{ needs.checkstyle.outputs.passed }}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| python-tests | ${{ needs.python-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agent-volume-isolation | ${{ needs.agent-volume-isolation.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| test-flowtree | ${{ needs.test-flowtree.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| test | ${{ needs.test.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| test-media | ${{ needs.test-media.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| test-mac | ${{ needs.test-mac.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| test-media-mac | ${{ needs.test-media-mac.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| analysis | ${{ needs.analysis.result }} |" >> "$GITHUB_STEP_SUMMARY"
