name: "Build and Test"

on:
  workflow_dispatch:
    inputs:
      auto_resolve:
        description: 'Submit auto-resolve agent jobs to FlowTree'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  # ─── Change Detection ─────────────────────────────────────────────
  # Determines whether code files were changed. If only documentation
  # files were modified, downstream test jobs are skipped to save CI
  # compute. workflow_dispatch always runs the full pipeline.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - id: filter
        run: |
          # workflow_dispatch always runs the full pipeline
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Compare against base branch for PRs, parent for pushes
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi

          # Look for non-doc code files (java, xml, yaml, yml, sh, py, groovy, properties)
          CODE_FILES=$(git diff --name-only "$BASE" HEAD -- \
            '*.java' '*.xml' '*.yaml' '*.yml' '*.sh' '*.py' '*.groovy' '*.properties' \
            | grep -v '^docs/' | grep -v '\.md$' || true)
          if [ -z "$CODE_FILES" ]; then
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Docs-only change detected — skipping test pipeline"
          else
            echo "code=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: changes
    if: needs.changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build
        run: mvn install -DskipTests

      - name: Flowtree Tests
        run: |
          mvn test -pl flowtree \
           -DAR_TEST_PROFILE=pipeline

  # ─── Code Policy Enforcement ───────────────────────────────────────
  code-policy-check:
    needs: build
    runs-on: ubuntu-latest
    # Critical path: failures block the test jobs and trigger auto-resolve.
    outputs:
      passed: ${{ steps.check.outcome == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn install -DskipTests

      - name: Code Policy Enforcement
        id: check
        run: |
          LD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -pl tools \
           -Dtest="CodePolicyEnforcementTest#enforceCodePolicies+testDetector*" \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs"

      - name: Summary
        if: ${{ !cancelled() }}
        run: |
          echo "## Code Policy Enforcement" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check.outcome }}" = "success" ]; then
            echo "No code policy violations detected." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Code policy violations detected (PackedCollection GPU model, Features interfaces, etc.)." >> "$GITHUB_STEP_SUMMARY"
            echo "Run \`mvn test -pl tools -Dtest=CodePolicyEnforcementTest#enforceCodePolicies\` locally to see details." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─── Test Integrity Check ────────────────────────────────────────────
  # Detects modifications to existing test files that hide failures
  # (e.g., adding @Ignore, deleting assertions, weakening checks).
  # This job FAILS the build to prevent test-hiding from being merged.
  test-integrity-check:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.check.outcome == 'success' }}
      violation_count: ${{ steps.check.outputs.violation_count }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin master:refs/remotes/origin/master --no-tags

      - name: Check for enforcement infrastructure tampering
        id: enforcement
        if: github.ref != 'refs/heads/master'
        run: |
          # These files are the enforcement infrastructure. Any modification
          # on a PR branch is treated as tampering and fails the build.
          PROTECTED_FILES=(
            "utils/src/main/java/org/almostrealism/util/CodePolicyViolationDetector.java"
            "utils/src/main/java/org/almostrealism/util/DuplicateCodeDetector.java"
            "utils/src/main/java/org/almostrealism/util/TestTimeoutEnforcementScanner.java"
            "tools/src/test/java/org/almostrealism/util/test/CodePolicyEnforcementTest.java"
            "tools/ci/detect-test-hiding.sh"
            "tools/ci/check-quality-gates.sh"
          )

          TAMPERED=""
          for f in "${PROTECTED_FILES[@]}"; do
            if git diff --name-only origin/master...HEAD -- "$f" | grep -q .; then
              TAMPERED="${TAMPERED}- ${f}\n"
            fi
          done

          if [ -n "$TAMPERED" ]; then
            echo "::error::Enforcement infrastructure was modified — this is not allowed on PR branches"
            echo -e "## Enforcement Infrastructure Tampering Detected\n" > ${RUNNER_TEMP}/enforcement-report.txt
            echo -e "The following protected files were modified on this branch:\n" >> ${RUNNER_TEMP}/enforcement-report.txt
            echo -e "$TAMPERED" >> ${RUNNER_TEMP}/enforcement-report.txt
            echo -e "\nThese files enforce code policies and test integrity. They CANNOT be" >> ${RUNNER_TEMP}/enforcement-report.txt
            echo -e "modified on PR branches. The only way to pass the build is to fix the" >> ${RUNNER_TEMP}/enforcement-report.txt
            echo -e "production code that violates the policies — not to weaken the policies.\n" >> ${RUNNER_TEMP}/enforcement-report.txt
            echo -e "If you believe a policy needs to change, open a separate PR with a" >> ${RUNNER_TEMP}/enforcement-report.txt
            echo -e "justification for human review." >> ${RUNNER_TEMP}/enforcement-report.txt
            cat ${RUNNER_TEMP}/enforcement-report.txt
            exit 1
          fi

          echo "No enforcement infrastructure modifications detected."

      - name: Check for test-hiding modifications
        id: check
        if: github.ref != 'refs/heads/master'
        run: |
          chmod +x ./tools/ci/agent-protection/detect-test-hiding.sh
          ./tools/ci/agent-protection/detect-test-hiding.sh origin/master ${RUNNER_TEMP}/test-integrity-report.txt || {
            EXIT_CODE=$?
            if [ "$EXIT_CODE" -eq 2 ]; then
              echo "::error::Test integrity violations detected — existing tests were modified to hide failures"
              exit 1
            fi
            exit "$EXIT_CODE"
          }

      - name: Summary
        if: ${{ !cancelled() }}
        run: |
          echo "## Test Integrity Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.enforcement.outcome }}" = "failure" ]; then
            echo "**FAILED: Enforcement infrastructure was tampered with.**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "The code policy enforcement files are protected and cannot be modified on PR branches." >> "$GITHUB_STEP_SUMMARY"
            echo "Fix the policy violations in your production code instead." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            if [ -f ${RUNNER_TEMP}/enforcement-report.txt ]; then
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              cat ${RUNNER_TEMP}/enforcement-report.txt >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            fi
          elif [ "${{ steps.check.outcome }}" != "success" ]; then
            echo "**FAILED: Existing tests were modified in ways that hide failures.**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Tests that exist on the base branch are the specification. If the branch breaks" >> "$GITHUB_STEP_SUMMARY"
            echo "them, the production code must be fixed — not the tests." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            if [ -f ${RUNNER_TEMP}/test-integrity-report.txt ]; then
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              cat ${RUNNER_TEMP}/test-integrity-report.txt >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "No test-hiding modifications or enforcement tampering detected." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─── Deception Audit ─────────────────────────────────────────────
  # Scans the branch commit history for patterns of coordinated
  # agent deception: ping-pong modifications, test-only commits,
  # TestDepth churn, and revert-then-reapply cycles.
  # This is an informational check — it does not block the build
  # but its findings are included in the auto-resolve prompt.
  deception-audit:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/master'
    outputs:
      has_findings: ${{ steps.audit.outputs.has_findings }}
      finding_count: ${{ steps.audit.outputs.finding_count }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin master:refs/remotes/origin/master --no-tags

      - name: Run deception audit
        id: audit
        run: |
          chmod +x ./tools/ci/agent-protection/deception-audit.sh
          ./tools/ci/agent-protection/deception-audit.sh origin/master ${RUNNER_TEMP}/deception-audit-report.txt || {
            EXIT_CODE=$?
            if [ "$EXIT_CODE" -eq 2 ]; then
              echo "::warning::Deception patterns detected on this branch"
            fi
            # Do not fail the build — this is informational
            exit 0
          }

      - name: Summary
        if: ${{ !cancelled() }}
        run: |
          echo "## Deception Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.audit.outputs.has_findings }}" = "true" ]; then
            echo "**WARNING: ${{ steps.audit.outputs.finding_count }} deception pattern(s) detected.**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            if [ -f ${RUNNER_TEMP}/deception-audit-report.txt ]; then
              cat ${RUNNER_TEMP}/deception-audit-report.txt >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "No deception patterns detected." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─── Agent Commit Validation ────────────────────────────────────
  # Validates that agent commits do not modify test files or CI
  # files. This is a hard block — agent commits that violate these
  # rules are rejected. Only runs on non-master branches.
  agent-commit-validation:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/master'
    outputs:
      blocked: ${{ steps.validate.outputs.blocked }}
      block_reason: ${{ steps.validate.outputs.block_reason }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin master:refs/remotes/origin/master --no-tags

      - name: Validate agent commit
        id: validate
        run: |
          chmod +x ./tools/ci/agent-protection/validate-agent-commit.sh
          ./tools/ci/agent-protection/validate-agent-commit.sh origin/master --require-production-changes || {
            EXIT_CODE=$?
            if [ "$EXIT_CODE" -eq 2 ]; then
              echo "::error::Agent commit BLOCKED: test file modifications detected"
            elif [ "$EXIT_CODE" -eq 3 ]; then
              echo "::warning::Agent commit flagged: no production code changes"
            elif [ "$EXIT_CODE" -eq 4 ]; then
              echo "::error::Agent commit BLOCKED: CI/workflow file modifications detected"
            fi
            # Do not fail the build — the auto-resolve job checks this output
            exit 0
          }

      - name: Summary
        if: ${{ !cancelled() }}
        run: |
          echo "## Agent Commit Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.validate.outputs.blocked }}" = "true" ]; then
            echo "**BLOCKED:** ${{ steps.validate.outputs.block_reason }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Agent commit validation passed." >> "$GITHUB_STEP_SUMMARY"
          fi

  javadoc-check:
    needs: test-media
    runs-on: ubuntu-latest
    # Out of the critical path: does not block tests or other jobs.
    # Failures are reported but do not fail the overall workflow.
    continue-on-error: true
    outputs:
      passed: ${{ steps.check.outcome == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn install -DskipTests

      - name: Check Javadoc Coverage
        id: check
        run: mvn checkstyle:check -Pjavadoc-check

      - name: Summary
        if: ${{ !cancelled() }}
        run: |
          echo "## Javadoc Coverage Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check.outcome }}" = "success" ]; then
            echo "All non-private classes and methods have Javadoc documentation." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Some non-private classes or methods are missing Javadoc documentation." >> "$GITHUB_STEP_SUMMARY"
            echo "Run \`mvn checkstyle:check -Pjavadoc-check\` locally to see details." >> "$GITHUB_STEP_SUMMARY"
          fi

  test-timeout-check:
    needs: build
    runs-on: ubuntu-latest
    # Critical path: failures block the test jobs and trigger auto-resolve.
    outputs:
      passed: ${{ steps.check.outcome == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn install -DskipTests

      - name: Check Test Timeouts
        id: check
        run: |
          LD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -pl tools \
           -Dtest=CodePolicyEnforcementTest#enforceTestTimeouts \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs"

      - name: Summary
        if: ${{ !cancelled() }}
        run: |
          echo "## Test Timeout Enforcement" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check.outcome }}" = "success" ]; then
            echo "All @Test annotations include a timeout parameter." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Some @Test annotations are missing a timeout parameter." >> "$GITHUB_STEP_SUMMARY"
            echo "Run \`mvn test -pl tools -Dtest=CodePolicyEnforcementTest#enforceTestTimeouts\` locally to see details." >> "$GITHUB_STEP_SUMMARY"
          fi

  duplicate-code-check:
    needs: build
    runs-on: ubuntu-latest
    # Critical path: failures block the test jobs and trigger auto-resolve.
    outputs:
      passed: ${{ steps.check.outcome == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn install -DskipTests

      - name: Check Duplicate Code
        id: check
        run: |
          LD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -pl tools \
           -Dtest=CodePolicyEnforcementTest#enforceNoDuplicateCode \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs"

      - name: Summary
        if: ${{ !cancelled() }}
        run: |
          echo "## Duplicate Code Detection" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check.outcome }}" = "success" ]; then
            echo "No blocks of 10+ identical lines found across different files." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Duplicate code blocks (10+ identical lines) detected across different files." >> "$GITHUB_STEP_SUMMARY"
            echo "Run \`mvn test -pl tools -Dtest=CodePolicyEnforcementTest#enforceNoDuplicateCode\` locally to see details." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─── Checkstyle Check ──────────────────────────────────────────────
  # Runs the default checkstyle rules (no var, no @SuppressWarnings)
  # as a dedicated job for clear violation reporting in the PR summary.
  checkstyle:
    needs: [changes, build]
    if: needs.changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      passed: ${{ steps.check.outcome == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn install -DskipTests

      - name: Run Checkstyle
        id: check
        continue-on-error: true
        run: |
          mvn checkstyle:check -B 2>&1 | tee /tmp/checkstyle-output.txt
          exit ${PIPESTATUS[0]}

      - name: Summary
        if: ${{ !cancelled() }}
        run: |
          echo "## Checkstyle" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check.outcome }}" = "success" ]; then
            echo "No checkstyle violations detected." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Checkstyle violations detected.**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -E '\[ERROR\]' /tmp/checkstyle-output.txt >> "$GITHUB_STEP_SUMMARY" || echo "(no ERROR lines captured)" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Run \`mvn checkstyle:check\` locally to see details." >> "$GITHUB_STEP_SUMMARY"
          fi

  test:
    needs: [build, code-policy-check, test-timeout-check, duplicate-code-check, test-integrity-check]
    runs-on: [self-hosted, linux, ar-ci]
    strategy:
      fail-fast: true
      matrix:
        group: [0, 1, 2, 3, 4, 5, 6]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn install -DskipTests

      - name: Run Utils Tests (Group ${{ matrix.group }})
        run: |
          LD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -pl engine/utils \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           -DAR_TEST_GROUP=${{ matrix.group }} \
           -DAR_TEST_GROUPS=7 \
           2>&1 | tee "${{ runner.temp }}/mvn-utils-test.log"

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-utils-group-${{ matrix.group }}
          path: |
            **/target/surefire-reports/TEST-*.xml
          retention-days: 7
          if-no-files-found: ignore

      - name: Run ML Tests (Group ${{ matrix.group }})
        run: |
          LD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -pl engine/ml \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           -DAR_TEST_PROFILE=pipeline \
           -DAR_TEST_GROUP=${{ matrix.group }} \
           -DAR_TEST_GROUPS=7 \
           2>&1 | tee "${{ runner.temp }}/mvn-ml-test.log"

      - name: Upload ML Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-ml-group-${{ matrix.group }}
          path: |
            **/target/surefire-reports/TEST-*.xml
          retention-days: 7
          if-no-files-found: ignore

      - name: Extract crash reports
        if: always()
        env:
          CRASH_REPORT_DIR: ${{ runner.temp }}/crash-reports
        run: |
          ./tools/ci/extract-crash-reports.sh "${{ runner.temp }}"/mvn-*.log

      - name: Upload Crash Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crash-reports-group-${{ matrix.group }}
          path: ${{ runner.temp }}/crash-reports/
          retention-days: 7
          if-no-files-found: ignore

      - name: Collect Coverage Data
        if: always()
        run: |
          mkdir -p coverage-data
          find . -path "*/target/jacoco.exec" -exec cp --parents {} coverage-data/ \;

      - name: Upload Coverage Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-group-${{ matrix.group }}
          path: coverage-data/
          retention-days: 1

  test-media:
    needs: [test]
    runs-on: [self-hosted, linux, ar-ci]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn install -DskipTests

      - name: Run Audio Tests
        run: |
          LD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -pl engine/audio \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           -DAR_TEST_PROFILE=pipeline \
           2>&1 | tee "${{ runner.temp }}/mvn-audio-test.log"

      - name: Run Music Tests
        run: |
          LD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -pl studio/music \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           -DAR_TEST_PROFILE=pipeline \
           2>&1 | tee "${{ runner.temp }}/mvn-music-test.log"

      - name: Run Compose Tests
        run: |
          LD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -pl studio/compose \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           -DAR_TEST_PROFILE=pipeline \
           2>&1 | tee "${{ runner.temp }}/mvn-compose-test.log"

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-media
          path: |
            **/target/surefire-reports/TEST-*.xml
          retention-days: 7
          if-no-files-found: ignore

      - name: Extract crash reports
        if: always()
        env:
          CRASH_REPORT_DIR: ${{ runner.temp }}/crash-reports
        run: |
          ./tools/ci/extract-crash-reports.sh "${{ runner.temp }}"/mvn-*.log

      - name: Upload Crash Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crash-reports-media
          path: ${{ runner.temp }}/crash-reports/
          retention-days: 7
          if-no-files-found: ignore

      - name: Collect Coverage Data
        if: always()
        run: |
          mkdir -p coverage-data
          find . -path "*/target/jacoco.exec" -exec cp --parents {} coverage-data/ \;

      - name: Upload Coverage Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-media
          path: coverage-data/
          retention-days: 1

  # ─── macOS Test Jobs ────────────────────────────────────────────────

  test-mac:
    needs: [test-media]
    runs-on: [self-hosted, macos, ar-ci]
    concurrency:
      group: test-mac-${{ github.ref }}-${{ matrix.group }}
      cancel-in-progress: true
    strategy:
      fail-fast: true
      matrix:
        group: [0, 1, 2]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn install -DskipTests

      - name: Run Utils Tests (Group ${{ matrix.group }})
        run: |
          DYLD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -pl engine/utils \
           -DAR_HARDWARE_DRIVER=* \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           -DAR_TEST_GROUP=${{ matrix.group }} \
           -DAR_TEST_GROUPS=3

      - name: Run ML Tests (Group ${{ matrix.group }})
        run: |
          DYLD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -pl engine/ml \
           -DAR_HARDWARE_DRIVER=* \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           -DAR_TEST_PROFILE=pipeline \
           -DAR_TEST_GROUP=${{ matrix.group }} \
           -DAR_TEST_GROUPS=3

  test-media-mac:
    needs: [test-mac]
    runs-on: [self-hosted, macos, ar-ci]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn install -DskipTests

      - name: Run Audio Tests
        run: |
          DYLD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -pl engine/audio \
           -DAR_HARDWARE_DRIVER=* \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs"

      - name: Run Music Tests
        run: |
          DYLD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -pl studio/music \
           -DAR_HARDWARE_DRIVER=* \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs"

      - name: Run Compose Tests
        run: |
          DYLD_LIBRARY_PATH="${{ runner.temp }}/ar_libs" mvn test -pl studio/compose \
           -DAR_HARDWARE_DRIVER=native \
           -DAR_HARDWARE_MEMORY_SCALE=7 \
           -DAR_HARDWARE_LIBS="${{ runner.temp }}/ar_libs" \
           -DAR_TEST_PROFILE=pipeline

  analysis:
    needs: [test-media]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build for Analysis
        run: mvn install -DskipTests

      - name: Download All Coverage Data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: all-coverage

      - name: Merge Coverage Data
        run: |
          # Find all jacoco.exec files and create a file list
          find all-coverage -name "jacoco.exec" > exec-files.txt
          echo "Found coverage files:"
          cat exec-files.txt

          # Create merged coverage directory
          mkdir -p .qodana/code-coverage

          # Use JaCoCo CLI to merge all exec files
          if [ -s exec-files.txt ]; then
            # Download JaCoCo CLI
            JACOCO_VERSION=0.8.11
            curl -sL -o jacoco-cli.zip \
              "https://repo1.maven.org/maven2/org/jacoco/jacoco/$JACOCO_VERSION/jacoco-$JACOCO_VERSION.zip"
            unzip -q jacoco-cli.zip -d jacoco-cli

            # Merge all exec files
            java -jar jacoco-cli/lib/jacococli.jar merge \
              $(cat exec-files.txt | tr '\n' ' ') \
              --destfile merged-jacoco.exec

            # Generate XML report for Qodana
            # Need to specify all class directories (each as separate --classfiles arg)
            java -jar jacoco-cli/lib/jacococli.jar report merged-jacoco.exec \
              $(find . -path "*/target/classes" -type d -exec echo --classfiles {} \;) \
              $(find . -path "*/src/main/java" -type d -exec echo --sourcefiles {} \;) \
              --xml .qodana/code-coverage/coverage.xml \
              --html .qodana/code-coverage/html

            echo "Coverage report generated at .qodana/code-coverage/"
          else
            echo "No coverage files found"
          fi

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .qodana/code-coverage/
          retention-days: 30

  qodana:
    needs: [analysis]
    runs-on: ubuntu-latest
    permissions:
      checks: write
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'maven'

      - name: Build for Analysis
        run: mvn install -DskipTests

      - name: Qodana Scan
        uses: JetBrains/qodana-action@main
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          args: "-i,.,--linter,jetbrains/qodana-jvm"
          pr-mode: false

      - name: Github Scan
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana.sarif.json

  # ─── Auto-Resolve Job ─────────────────────────────────────────────────
  # Downloads Surefire reports from all test jobs, parses them for
  # failures, and submits a FlowTree coding-agent job to attempt a fix.
  #
  # Concurrency note: GitHub Actions does not natively support "skip if
  # already running" semantics. The concurrency group below ensures only
  # one auto-resolve job runs per branch at a time. If a new run is
  # triggered while one is pending (queued), the pending one is cancelled
  # in favor of the newer run. A truly running job will block the new one
  # from starting until it completes.

  auto-resolve:
    needs: [changes, build, test, test-media, javadoc-check, code-policy-check, test-timeout-check, duplicate-code-check, test-integrity-check, deception-audit, agent-commit-validation, checkstyle, analysis]
    if: ${{ !cancelled() && github.ref != 'refs/heads/master' }}
    runs-on: [self-hosted, macos, ar-ci]
    concurrency:
      group: auto-resolve-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Check build result
        id: build-check
        run: |
          if [ "${{ needs.changes.outputs.code_changed }}" = "false" ]; then
            echo "build_failed=false" >> "$GITHUB_OUTPUT"
            echo "docs_only_skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Build skipped — docs-only change"
          elif [ "${{ needs.build.result }}" != "success" ]; then
            echo "build_failed=true" >> "$GITHUB_OUTPUT"
            echo "docs_only_skip=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Build failed — treating as total test failure"
          else
            echo "build_failed=false" >> "$GITHUB_OUTPUT"
            echo "docs_only_skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine branch context
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "branch=${{ github.head_ref }}" >> "$GITHUB_OUTPUT"
            echo "base=${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "base=master" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for docs-only changes
        id: docs-check
        run: |
          CHANGED_FILES=$(git diff --name-only origin/${{ steps.ctx.outputs.base }}...${{ steps.ctx.outputs.head_sha }} || true)
          if [ -z "$CHANGED_FILES" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NON_DOCS=$(echo "$CHANGED_FILES" | grep -v '^docs/' || true)
          if [ -z "$NON_DOCS" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "::notice::All changes are under docs/ — will use verify prompt instead of review"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Build failure path ──────────────────────────────────────
      # When the build itself fails, no tests run. Submit an agent
      # job to fix the compilation error directly.

      - name: Build prompt (build failure)
        if: steps.build-check.outputs.build_failed == 'true'
        env:
          BRANCH: ${{ steps.ctx.outputs.branch }}
          COMMIT_SHA: ${{ steps.ctx.outputs.head_sha }}

        run: |
          ./tools/ci/prompts/build-build-failure-prompt.sh "${{ runner.temp }}/agent-prompt.txt"

      - name: Submit agent job (build failure)
        if: steps.build-check.outputs.build_failed == 'true' && inputs.auto_resolve != 'false'
        env:
          CONTROLLER_HOST: ${{ secrets.FLOWTREE_CONTROLLER_HOST || 'mac-studio' }}
          CONTROLLER_PORT: ${{ secrets.FLOWTREE_CONTROLLER_PORT || '7780' }}
          BRANCH: ${{ steps.ctx.outputs.branch }}
          BASE_BRANCH: ${{ steps.ctx.outputs.base }}
          DESCRIPTION: "Resolve build failure"
        run: |
          ./tools/ci/submit-agent-job.sh "${{ runner.temp }}/agent-prompt.txt"

      # ── Test failure path ───────────────────────────────────────
      # When the build succeeded, download and parse Surefire reports.
      # Only linux test results are considered — test-mac failures are
      # not treated as requiring auto-resolution.

      - name: Clean stale surefire reports
        if: steps.build-check.outputs.build_failed != 'true'
        run: |
          # On self-hosted runners, previous test-mac runs may leave
          # surefire reports in the workspace. Remove them so they
          # cannot contaminate the artifact download directory.
          find . -path "*/target/surefire-reports" -type d -exec rm -rf {} + 2>/dev/null || true
          rm -rf all-surefire-reports

      - name: Download Surefire Reports
        if: steps.build-check.outputs.build_failed != 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: surefire-*
          path: all-surefire-reports
          merge-multiple: false

      - name: Download Crash Reports
        if: steps.build-check.outputs.build_failed != 'true'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: crash-reports-*
          path: all-crash-reports
          merge-multiple: true

      - name: Filter to linux-only surefire reports
        if: steps.build-check.outputs.build_failed != 'true'
        run: |
          # Only keep artifacts from known linux test jobs:
          #   surefire-utils-group-*, surefire-ml-group-*, surefire-media
          # Remove any unexpected directories (e.g., if a mac job ever
          # starts uploading surefire artifacts).
          mkdir -p all-surefire-reports
          for dir in all-surefire-reports/*/; do
            base=$(basename "$dir")
            case "$base" in
              surefire-utils-group-*|surefire-ml-group-*|surefire-media)
                echo "::notice::Keeping linux surefire artifact: $base"
                ;;
              *)
                echo "::warning::Removing non-linux surefire artifact: $base"
                rm -rf "$dir"
                ;;
            esac
          done

      - name: Parse test failures
        if: steps.build-check.outputs.build_failed != 'true'
        id: failures
        run: |
          eval "$(./tools/ci/parse-surefire-failures.sh all-surefire-reports "${{ runner.temp }}/test-failures.txt")"
          echo "failure_count=$failure_count" >> "$GITHUB_OUTPUT"
          echo "has_failures=$has_failures" >> "$GITHUB_OUTPUT"
          if [ "$has_failures" = "true" ]; then
            echo "::notice::Found $failure_count test failure(s) to auto-resolve"
          else
            echo "::notice::No test failures found"
          fi

      - name: Check for incomplete test execution
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true'
        id: test-completeness
        run: |
          # A job result of "failure" means the job ran and hit a real error
          # (e.g., JVM crash, OOM, build error within the test step) even though
          # no surefire XML was produced. This is a genuine failure, not
          # "incomplete" testing. Treat it like a build failure.
          #
          # A job result of "cancelled" means GitHub cancelled the job because
          # an upstream dependency failed (fail-fast). If the upstream that
          # failed is "test" itself (result=failure), the cancellation of
          # test-media is expected collateral — not a separate incompleteness.
          #
          # "Incomplete" means a job was cancelled/skipped with NO upstream
          # failure to explain it (e.g., infrastructure issue, concurrency
          # cancellation).
          INCOMPLETE="false"
          HAS_REAL_FAILURE="false"

          TEST_RESULT="${{ needs.test.result }}"
          MEDIA_RESULT="${{ needs.test-media.result }}"
          echo "::notice::test job result: ${TEST_RESULT}, test-media job result: ${MEDIA_RESULT}"

          # Check for genuine failures (job ran but failed without surefire XML)
          if [ "$TEST_RESULT" = "failure" ]; then
            HAS_REAL_FAILURE="true"
            echo "::warning::test job failed without producing parseable surefire failures — treating as build failure"
          fi
          if [ "$MEDIA_RESULT" = "failure" ]; then
            HAS_REAL_FAILURE="true"
            echo "::warning::test-media job failed without producing parseable surefire failures — treating as build failure"
          fi

          # If a real failure occurred, route to the build-failure path
          # (not the incomplete path) by setting build_failed retroactively
          if [ "$HAS_REAL_FAILURE" = "true" ]; then
            echo "build_failed_in_tests=true" >> "$GITHUB_OUTPUT"
            echo "incomplete=$INCOMPLETE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check whether any validation gate that "test" depends on has
          # failed.  When a gate fails the test job is skipped by GitHub
          # Actions (dependency not met).  That skip is *explained* — it
          # is not an infrastructure-level incompleteness.  The validation
          # failures have their own resolution paths downstream (code
          # policy, quality gates).
          VALIDATION_FAILED="false"
          if [ "${{ needs.code-policy-check.outputs.passed }}" != "true" ]; then
            VALIDATION_FAILED="true"
          fi
          if [ "${{ needs.test-timeout-check.outputs.passed }}" != "true" ]; then
            VALIDATION_FAILED="true"
          fi
          if [ "${{ needs.duplicate-code-check.outputs.passed }}" != "true" ]; then
            VALIDATION_FAILED="true"
          fi
          if [ "${{ needs.test-integrity-check.outputs.passed }}" != "true" ]; then
            VALIDATION_FAILED="true"
          fi

          # Only flag as incomplete if jobs were cancelled/skipped without
          # an upstream failure to explain it
          if [ "$TEST_RESULT" = "cancelled" ] || [ "$TEST_RESULT" = "skipped" ]; then
            if [ "$VALIDATION_FAILED" = "true" ]; then
              echo "::notice::test job was ${TEST_RESULT} because an upstream validation check failed — not treating as incomplete"
            else
              echo "::warning::test job was ${TEST_RESULT} without an upstream failure"
              INCOMPLETE="true"
            fi
          fi
          if [ "$MEDIA_RESULT" = "cancelled" ] || [ "$MEDIA_RESULT" = "skipped" ]; then
            # test-media cancelled because test failed/skipped is expected, not incomplete
            if [ "$TEST_RESULT" != "failure" ] && [ "$TEST_RESULT" != "skipped" ]; then
              if [ "$VALIDATION_FAILED" = "true" ]; then
                echo "::notice::test-media job was ${MEDIA_RESULT} because an upstream validation check failed — not treating as incomplete"
              else
                echo "::warning::test-media job was ${MEDIA_RESULT} without test job failure"
                INCOMPLETE="true"
              fi
            fi
          fi
          echo "incomplete=$INCOMPLETE" >> "$GITHUB_OUTPUT"

      - name: Upload failure summary
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-summary
          path: ${{ runner.temp }}/test-failures.txt
          retention-days: 7

      - name: Build prompt (test failures)
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures == 'true'
        env:
          FAILURE_COUNT: ${{ steps.failures.outputs.failure_count }}
          BRANCH: ${{ steps.ctx.outputs.branch }}
          COMMIT_SHA: ${{ steps.ctx.outputs.head_sha }}

        run: |
          ./tools/ci/prompts/build-resolve-prompt.sh "${{ runner.temp }}/test-failures.txt" "${{ runner.temp }}/agent-prompt.txt"

      - name: Extract failing test class names
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures == 'true'
        id: test-classes
        run: |
          # Extract test class names from the failure summary for the escalation tracker
          CLASSES=$(grep -oP '[\w.]+Test\w*' "${{ runner.temp }}/test-failures.txt" 2>/dev/null | sort -u | tr '\n' ' ' || true)
          echo "failing_classes=$CLASSES" >> "$GITHUB_OUTPUT"

      - name: Submit agent job (test failures)
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures == 'true' && inputs.auto_resolve != 'false'
        env:
          CONTROLLER_HOST: ${{ secrets.FLOWTREE_CONTROLLER_HOST || 'mac-studio' }}
          CONTROLLER_PORT: ${{ secrets.FLOWTREE_CONTROLLER_PORT || '7780' }}
          BRANCH: ${{ steps.ctx.outputs.branch }}
          BASE_BRANCH: ${{ steps.ctx.outputs.base }}
          PROTECT_TEST_FILES: "true"
          FAILING_TEST_CLASSES: ${{ steps.test-classes.outputs.failing_classes }}
          ENFORCE_CHANGES: "true"
          DESCRIPTION: "Resolve ${{ steps.failures.outputs.failure_count }} test failure(s)"
        run: |
          ./tools/ci/submit-agent-job.sh "${{ runner.temp }}/agent-prompt.txt"

      # ── Test job failure without surefire XML ──────────────────────
      # When a test job had result "failure" but no surefire failures
      # were parsed (e.g., JVM OOM, SIGABRT, native crash), use the
      # crash-specific prompt with Maven output and dumpstream details.

      - name: Build prompt (test job crash)
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.test-completeness.outputs.build_failed_in_tests == 'true'
        env:
          BRANCH: ${{ steps.ctx.outputs.branch }}
          COMMIT_SHA: ${{ steps.ctx.outputs.head_sha }}

        run: |
          ./tools/ci/prompts/build-vm-crash-prompt.sh all-crash-reports "${{ runner.temp }}/agent-prompt.txt"

      - name: Extract crashed test class names
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.test-completeness.outputs.build_failed_in_tests == 'true'
        id: crash-classes
        run: |
          CLASSES=""
          if [ -f all-crash-reports/crash-summary.txt ]; then
            CLASSES=$(grep -oP 'org\.almostrealism\.\S*Test\S*' all-crash-reports/crash-summary.txt 2>/dev/null | sort -u | tr '\n' ' ' || true)
          fi
          echo "failing_classes=$CLASSES" >> "$GITHUB_OUTPUT"

      - name: Submit agent job (test job crash)
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.test-completeness.outputs.build_failed_in_tests == 'true' && inputs.auto_resolve != 'false'
        env:
          CONTROLLER_HOST: ${{ secrets.FLOWTREE_CONTROLLER_HOST || 'mac-studio' }}
          CONTROLLER_PORT: ${{ secrets.FLOWTREE_CONTROLLER_PORT || '7780' }}
          BRANCH: ${{ steps.ctx.outputs.branch }}
          BASE_BRANCH: ${{ steps.ctx.outputs.base }}
          PROTECT_TEST_FILES: "true"
          FAILING_TEST_CLASSES: ${{ steps.crash-classes.outputs.failing_classes }}
          ENFORCE_CHANGES: "true"
          DESCRIPTION: "Resolve JVM crash in test execution"
        run: |
          ./tools/ci/submit-agent-job.sh "${{ runner.temp }}/agent-prompt.txt"

      # ── Incomplete test execution path ─────────────────────────────
      # When test jobs were cancelled or skipped without any upstream
      # failure to explain it (e.g., infrastructure issue, concurrency
      # cancellation). Jobs cancelled because an upstream job failed
      # are NOT considered incomplete — that's expected fail-fast.

      - name: Build prompt (incomplete tests)
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.test-completeness.outputs.build_failed_in_tests != 'true' && steps.test-completeness.outputs.incomplete == 'true'
        env:
          BRANCH: ${{ steps.ctx.outputs.branch }}
          COMMIT_SHA: ${{ steps.ctx.outputs.head_sha }}

        run: |
          ./tools/ci/prompts/build-build-failure-prompt.sh "${{ runner.temp }}/agent-prompt.txt"

      - name: Submit agent job (incomplete tests)
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.test-completeness.outputs.build_failed_in_tests != 'true' && steps.test-completeness.outputs.incomplete == 'true' && inputs.auto_resolve != 'false'
        env:
          CONTROLLER_HOST: ${{ secrets.FLOWTREE_CONTROLLER_HOST || 'mac-studio' }}
          CONTROLLER_PORT: ${{ secrets.FLOWTREE_CONTROLLER_PORT || '7780' }}
          BRANCH: ${{ steps.ctx.outputs.branch }}
          BASE_BRANCH: ${{ steps.ctx.outputs.base }}
          DESCRIPTION: "Investigate incomplete test execution"
        run: |
          ./tools/ci/submit-agent-job.sh "${{ runner.temp }}/agent-prompt.txt"

      # ── Quality gate fallback ──────────────────────────────────────
      # When no test failures exist, check quality gates and submit
      # those for auto-resolution instead. This ensures style and
      # reusability issues are addressed only after correctness.

      # ── Code policy violation path ────────────────────────────────
      # When code policy enforcement failed, use the dedicated prompt
      # that explains the policies and forbids circumvention.

      - name: Build prompt (code policy violations)
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.test-completeness.outputs.incomplete != 'true' && steps.test-completeness.outputs.build_failed_in_tests != 'true' && needs.code-policy-check.outputs.passed != 'true'
        env:
          BRANCH: ${{ steps.ctx.outputs.branch }}
          COMMIT_SHA: ${{ steps.ctx.outputs.head_sha }}

        run: |
          chmod +x ./tools/ci/prompts/build-policy-violation-prompt.sh
          ./tools/ci/prompts/build-policy-violation-prompt.sh "${{ runner.temp }}/agent-prompt.txt"

      - name: Submit agent job (code policy violations)
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.test-completeness.outputs.incomplete != 'true' && steps.test-completeness.outputs.build_failed_in_tests != 'true' && needs.code-policy-check.outputs.passed != 'true' && inputs.auto_resolve != 'false'
        env:
          CONTROLLER_HOST: ${{ secrets.FLOWTREE_CONTROLLER_HOST || 'mac-studio' }}
          CONTROLLER_PORT: ${{ secrets.FLOWTREE_CONTROLLER_PORT || '7780' }}
          BRANCH: ${{ steps.ctx.outputs.branch }}
          BASE_BRANCH: ${{ steps.ctx.outputs.base }}
          DESCRIPTION: "Resolve code policy violations"
        run: |
          ./tools/ci/submit-agent-job.sh "${{ runner.temp }}/agent-prompt.txt"

      # ── Other quality gate fallback ──────────────────────────────
      # When no test failures or policy violations exist, check
      # remaining quality gates.

      - name: Check quality gates
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.test-completeness.outputs.incomplete != 'true' && steps.test-completeness.outputs.build_failed_in_tests != 'true' && needs.code-policy-check.outputs.passed == 'true'
        id: quality
        env:
          JAVADOC_PASSED: ${{ needs.javadoc-check.outputs.passed }}
          TIMEOUT_PASSED: ${{ needs.test-timeout-check.outputs.passed }}
          DUPLICATE_PASSED: ${{ needs.duplicate-code-check.outputs.passed }}
          TEST_INTEGRITY_PASSED: ${{ needs.test-integrity-check.outputs.passed }}
          AGENT_COMMIT_BLOCKED: ${{ needs.agent-commit-validation.outputs.blocked }}
          AGENT_BLOCK_REASON: ${{ needs.agent-commit-validation.outputs.block_reason }}
          DECEPTION_AUDIT_FINDINGS: ${{ needs.deception-audit.outputs.has_findings }}
          DECEPTION_FINDING_COUNT: ${{ needs.deception-audit.outputs.finding_count }}
          CHECKSTYLE_PASSED: ${{ needs.checkstyle.outputs.passed }}
        run: |
          ./tools/ci/agent-protection/check-quality-gates.sh "${{ runner.temp }}/quality-gate-failures.txt"

      - name: Upload quality gate summary
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.quality.outputs.has_failures == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-summary
          path: ${{ runner.temp }}/quality-gate-failures.txt
          retention-days: 7

      - name: Build prompt (quality gates)
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.quality.outputs.has_failures == 'true'
        env:
          FAILURE_COUNT: ${{ steps.quality.outputs.failure_count }}
          BRANCH: ${{ steps.ctx.outputs.branch }}
          COMMIT_SHA: ${{ steps.ctx.outputs.head_sha }}

        run: |
          ./tools/ci/prompts/build-quality-gate-prompt.sh "${{ runner.temp }}/quality-gate-failures.txt" "${{ runner.temp }}/agent-prompt.txt"

      - name: Submit agent job (quality gates)
        if: steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.quality.outputs.has_failures == 'true' && inputs.auto_resolve != 'false'
        env:
          CONTROLLER_HOST: ${{ secrets.FLOWTREE_CONTROLLER_HOST || 'mac-studio' }}
          CONTROLLER_PORT: ${{ secrets.FLOWTREE_CONTROLLER_PORT || '7780' }}
          BRANCH: ${{ steps.ctx.outputs.branch }}
          BASE_BRANCH: ${{ steps.ctx.outputs.base }}
          DESCRIPTION: "Resolve quality gate failures"
        run: |
          ./tools/ci/submit-agent-job.sh "${{ runner.temp }}/agent-prompt.txt"

      # ── Docs-only verify path ──────────────────────────────────
      # When all changes are under docs/, skip the general review
      # and use the verify-completion prompt instead, since these
      # are typically plan documents for a workstream.

      - name: Build prompt (docs-only verify)
        if: (steps.build-check.outputs.docs_only_skip == 'true') || (steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.test-completeness.outputs.incomplete != 'true' && steps.test-completeness.outputs.build_failed_in_tests != 'true' && needs.code-policy-check.outputs.passed == 'true' && steps.quality.outputs.has_failures != 'true' && steps.docs-check.outputs.docs_only == 'true')
        env:
          BRANCH: ${{ steps.ctx.outputs.branch }}
          BASE_BRANCH: ${{ steps.ctx.outputs.base }}
          COMMIT_SHA: ${{ steps.ctx.outputs.head_sha }}
        run: |
          chmod +x ./tools/ci/prompts/build-verify-prompt.sh
          ./tools/ci/prompts/build-verify-prompt.sh "${{ runner.temp }}/agent-prompt.txt"

      - name: Submit agent job (docs-only verify)
        if: ((steps.build-check.outputs.docs_only_skip == 'true') || (steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.test-completeness.outputs.incomplete != 'true' && steps.test-completeness.outputs.build_failed_in_tests != 'true' && needs.code-policy-check.outputs.passed == 'true' && steps.quality.outputs.has_failures != 'true' && steps.docs-check.outputs.docs_only == 'true')) && inputs.auto_resolve != 'false'
        env:
          CONTROLLER_HOST: ${{ secrets.FLOWTREE_CONTROLLER_HOST || 'mac-studio' }}
          CONTROLLER_PORT: ${{ secrets.FLOWTREE_CONTROLLER_PORT || '7780' }}
          BRANCH: ${{ steps.ctx.outputs.branch }}
          BASE_BRANCH: ${{ steps.ctx.outputs.base }}
          DESCRIPTION: "Verify docs changes"
        run: |
          ./tools/ci/submit-agent-job.sh "${{ runner.temp }}/agent-prompt.txt"

      # ── General review fallback ─────────────────────────────────
      # When all tests and quality gates pass, submit a general
      # review job covering design, test quality, correctness,
      # documentation, and consistency with existing patterns.

      - name: Build prompt (general review)
        if: steps.build-check.outputs.docs_only_skip != 'true' && steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.test-completeness.outputs.incomplete != 'true' && steps.test-completeness.outputs.build_failed_in_tests != 'true' && needs.code-policy-check.outputs.passed == 'true' && steps.quality.outputs.has_failures != 'true' && steps.docs-check.outputs.docs_only != 'true'
        env:
          BRANCH: ${{ steps.ctx.outputs.branch }}
          BASE_BRANCH: ${{ steps.ctx.outputs.base }}
          COMMIT_SHA: ${{ steps.ctx.outputs.head_sha }}
        run: |
          ./tools/ci/prompts/build-review-prompt.sh "${{ runner.temp }}/agent-prompt.txt"

      - name: Submit agent job (general review)
        if: steps.build-check.outputs.docs_only_skip != 'true' && steps.build-check.outputs.build_failed != 'true' && steps.failures.outputs.has_failures != 'true' && steps.test-completeness.outputs.incomplete != 'true' && steps.test-completeness.outputs.build_failed_in_tests != 'true' && needs.code-policy-check.outputs.passed == 'true' && steps.quality.outputs.has_failures != 'true' && steps.docs-check.outputs.docs_only != 'true' && inputs.auto_resolve != 'false'
        env:
          CONTROLLER_HOST: ${{ secrets.FLOWTREE_CONTROLLER_HOST || 'mac-studio' }}
          CONTROLLER_PORT: ${{ secrets.FLOWTREE_CONTROLLER_PORT || '7780' }}
          BRANCH: ${{ steps.ctx.outputs.branch }}
          BASE_BRANCH: ${{ steps.ctx.outputs.base }}
          DESCRIPTION: "Review branch changes"
        run: |
          ./tools/ci/submit-agent-job.sh "${{ runner.temp }}/agent-prompt.txt"

      - name: Summary
        if: ${{ !cancelled() }}
        run: |
          echo "## Auto-Resolve" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.build-check.outputs.docs_only_skip }}" = "true" ]; then
            echo "**Docs-only change** — test pipeline was skipped." >> "$GITHUB_STEP_SUMMARY"
            echo "A FlowTree coding agent job was submitted to verify docs changes." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.build-check.outputs.build_failed }}" = "true" ]; then
            echo "**Build failed** — no tests were able to run." >> "$GITHUB_STEP_SUMMARY"
            echo "A FlowTree coding agent job was submitted to fix the build." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.failures.outputs.has_failures }}" = "true" ]; then
            echo "Found **${{ steps.failures.outputs.failure_count }}** test failure(s)." >> "$GITHUB_STEP_SUMMARY"
            echo "A FlowTree coding agent job was submitted to attempt automatic resolution." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Failing tests" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat "${{ runner.temp }}/test-failures.txt" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "(no failure file)" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.test-completeness.outputs.build_failed_in_tests }}" = "true" ]; then
            echo "**Test job failed** without producing surefire results (JVM crash, OOM, or build error within test step)." >> "$GITHUB_STEP_SUMMARY"
            echo "A FlowTree coding agent job was submitted to resolve the failure." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.test-completeness.outputs.incomplete }}" = "true" ]; then
            echo "**Test execution incomplete** — some test jobs were cancelled or skipped without an upstream failure to explain it." >> "$GITHUB_STEP_SUMMARY"
            echo "A FlowTree coding agent job was submitted to investigate." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ needs.code-policy-check.outputs.passed }}" != "true" ]; then
            echo "**Code policy violations detected.**" >> "$GITHUB_STEP_SUMMARY"
            echo "A FlowTree coding agent job was submitted with a dedicated policy violation prompt." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.quality.outputs.has_failures }}" = "true" ]; then
            echo "No test failures. Found **${{ steps.quality.outputs.failure_count }}** quality gate failure(s)." >> "$GITHUB_STEP_SUMMARY"
            echo "A FlowTree coding agent job was submitted to resolve quality issues." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Failing quality gates" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat "${{ runner.temp }}/quality-gate-failures.txt" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "(no failure file)" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.docs-check.outputs.docs_only }}" = "true" ]; then
            echo "All changes are under \`docs/\` — docs-only PR detected." >> "$GITHUB_STEP_SUMMARY"
            echo "A FlowTree coding agent job was submitted to verify docs changes." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "All tests and quality gates passed." >> "$GITHUB_STEP_SUMMARY"
            echo "A FlowTree coding agent job was submitted for general review." >> "$GITHUB_STEP_SUMMARY"
          fi
