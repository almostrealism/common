name: "Agent Volume Isolation"

# Enforces the hard invariant that FlowTree agent containers can never share
# data through a mounted volume (a shared writable directory is both a
# cross-workstream git-collision hazard and a data-exfiltration channel
# between unrelated workstreams). Parses the agent docker-compose.yml and
# fails if any two agents could share a writable source, or if any writable
# mount targets something other than the sanctioned /agent-transcripts sink.
#
# This is intentionally a standalone workflow, separate from analysis.yaml:
# it validates compose/CI configuration, not the Maven module graph, so it
# does not participate in layer-gating.

on:
  pull_request:
    paths:
      - "flowtree/runtime/agent/docker-compose.yml"
      - "flowtree/runtime/agent/entrypoint.sh"
      - "tools/ci/validate_agent_volume_isolation.py"
      - "tools/ci/test_validate_agent_volume_isolation.py"
      - ".github/workflows/agent-volume-isolation.yaml"
  push:
    branches:
      - master
    paths:
      - "flowtree/runtime/agent/docker-compose.yml"
      - "flowtree/runtime/agent/entrypoint.sh"
      - "tools/ci/validate_agent_volume_isolation.py"
      - "tools/ci/test_validate_agent_volume_isolation.py"
      - ".github/workflows/agent-volume-isolation.yaml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml pytest

      - name: Unit-test the validator
        working-directory: tools/ci
        run: python -m pytest test_validate_agent_volume_isolation.py -q

      - name: Validate agent volume isolation
        run: python tools/ci/validate_agent_volume_isolation.py
