# ─── AR CI Runner Fleet ──────────────────────────────────────────────
#
# Launches a fleet of self-hosted GitHub Actions runners that pick up
# jobs labelled `ar-ci` from the Almost Realism pipeline.
#
# Quick start:
#   cp .env.example .env   # fill in GITHUB_PAT, GITHUB_OWNER, GITHUB_REPO
#   docker compose up -d --scale runner=10
#
# See README.md for full documentation.
# ─────────────────────────────────────────────────────────────────────

services:
  runner:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - GITHUB_PAT=${GITHUB_PAT}
      - GITHUB_OWNER=${GITHUB_OWNER:-almostrealism}
      - GITHUB_REPO=${GITHUB_REPO:-common}
      - RUNNER_LABELS=ar-ci
      - AR_HARDWARE_LIBS=/tmp/ar_libs/
      - AR_HARDWARE_DRIVER=native
    volumes:
      # Shared Maven repository avoids re-downloading artifacts
      - maven-repo:/home/runner/.m2/repository
    deploy:
      resources:
        limits:
          memory: ${RUNNER_MEMORY_LIMIT:-16g}
          cpus: "${RUNNER_CPU_LIMIT:-4}"
    restart: unless-stopped

volumes:
  maven-repo:
    driver: local
