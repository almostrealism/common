# ─── AR CI Runner Fleet ──────────────────────────────────────────────
#
# Launches a fleet of self-hosted GitHub Actions runners that pick up
# jobs labelled `ar-ci` from the Almost Realism pipeline.
#
# Quick start:
#   cp .env.example .env   # fill in GITHUB_PAT, RUNNER_PREFIX
#   docker compose up -d --scale runner=5
#
# Each runner registers as <RUNNER_PREFIX>-1, <RUNNER_PREFIX>-2, etc.
# Set RUNNER_PREFIX per machine (e.g., "mac-studio", "linux-build-1").
#
# See README.md for full documentation.
# ─────────────────────────────────────────────────────────────────────

# Explicit project name — without this, Docker Compose uses the parent
# directory name ("docker"), which collides with any other runner fleet
# whose compose file also lives in a directory named "docker" (e.g.,
# the Mosaic Platform fleet). Sharing a project name between stacks
# causes one `docker compose up` to tear down the other's containers.
name: ar-ci

services:
  runner:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - GITHUB_PAT=${GITHUB_PAT}
      - GITHUB_OWNER=${GITHUB_OWNER:-almostrealism}
      - GITHUB_REPO=${GITHUB_REPO:-common}
      - RUNNER_PREFIX=${RUNNER_PREFIX:-ar-runner}
      - RUNNER_LABELS=ar-ci
    deploy:
      resources:
        limits:
          memory: ${RUNNER_MEMORY_LIMIT:-16g}
          cpus: "${RUNNER_CPU_LIMIT:-4}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
