# ─── FlowTree Controller Stack ────────────────────────────────────────
#
# Runs the three server-side services that make up the FlowTree
# controller stack:
#
#   flowtree-controller  The Java controller that accepts inbound agent
#                        connections (:7766) and exposes the job
#                        submission HTTP API (:7780).
#
#   ar-memory            Semantic memory store used by agents and the
#                        ar-manager MCP server.
#
#   ar-manager           MCP server that bridges Claude Code agents to
#                        the controller, GitHub, and ar-memory.
#
# ⚠ TLS REQUIREMENT ⚠
#   Services are exposed over plain HTTP. Bearer tokens and API traffic
#   are NOT encrypted in transit. For any internet-facing deployment,
#   place a TLS-terminating reverse proxy (Tailscale Funnel, Caddy,
#   nginx + certbot) in front of ar-manager.
#
# Quick start — run from the repo root:
#   ./flowtree/rebuild.sh
#
# Controller configuration:
#   Place workstreams.yaml and notification token files in
#   /Users/Shared/flowtree/controller/ on the host.
#   GitHub org tokens go in the githubOrgs section of workstreams.yaml.
#   See flowtree/src/main/resources/workstreams-example.yaml for reference.
#
# Manager configuration:
#   Place manager-tokens.json in /Users/Shared/flowtree/manager/ on the host.
#   Generate a token: tools/mcp/manager/generate-token.sh
#
# ─────────────────────────────────────────────────────────────────────

services:
  ar-memory:
    build:
      context: ../../tools/mcp/memory
      dockerfile: Dockerfile
    ports:
      - "${AR_MEMORY_PORT:-8020}:8020"
    volumes:
      - /Users/Shared/flowtree/memory-data:/data
    environment:
      - AR_MEMORY_DATA_DIR=/data
      - AR_MEMORY_HTTP_PORT=8020
      - AR_MEMORY_AUTH_TOKEN=${AR_MEMORY_AUTH_TOKEN:-}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  flowtree-controller:
    build:
      context: ../..
      dockerfile: flowtree/Dockerfile
    ports:
      - "7780:7780"
      - "7766:7766"
    volumes:
      - /Users/Shared/flowtree/controller:/config
      - /Users/Shared/flowtree/secrets:/secrets:ro
    environment:
      - FLOWTREE_PORT=7766
      - AR_MEMORY_URL=http://ar-memory:8020
      - AR_MANAGER_URL=https://mac-studio.taild0f87.ts.net
      - AR_MANAGER_SHARED_SECRET_FILE=/secrets/shared-secret
    depends_on:
      ar-memory:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  ar-manager:
    build:
      context: ../../tools/mcp
      dockerfile: manager/Dockerfile
    ports:
      - "${AR_MANAGER_PORT:-8010}:8010"
    volumes:
      - /Users/Shared/flowtree/manager:/config:ro
      - /Users/Shared/flowtree/secrets:/secrets:ro
    environment:
      - AR_CONTROLLER_URL=http://flowtree-controller:7780
      - AR_MEMORY_URL=http://ar-memory:8020
      - AR_MANAGER_GITHUB_TOKEN=${AR_MANAGER_GITHUB_TOKEN:-}
      - AR_MANAGER_TOKEN_FILE=/config/manager-tokens.json
      - AR_MANAGER_ISSUER_URL=${AR_MANAGER_ISSUER_URL:-}
      - AR_MANAGER_SHARED_SECRET_FILE=/secrets/shared-secret
      - AR_CONSULTANT_BACKEND=${AR_CONSULTANT_BACKEND:-llamacpp}
      - AR_CONSULTANT_LLAMA_URL=${AR_CONSULTANT_LLAMA_URL:-}
    depends_on:
      flowtree-controller:
        condition: service_started
      ar-memory:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
