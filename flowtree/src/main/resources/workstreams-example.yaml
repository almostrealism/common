# Example Slack workstream configuration for Flowtree Claude Code Agent
#
# Agents connect INBOUND to the controller's FlowTree server (set
# FLOWTREE_ROOT_HOST and FLOWTREE_ROOT_PORT on each agent). The
# controller distributes jobs to whichever agents are connected.
#
# Copy this file and customize for your workspace:
#   cp workstreams-example.yaml workstreams.yaml
#
# Then run:
#   export SLACK_BOT_TOKEN=xoxb-your-bot-token
#   export SLACK_APP_TOKEN=xapp-your-app-token
#   java -cp flowtree.jar io.flowtree.slack.FlowTreeController --config workstreams.yaml

# Default workspace path (optional, global).
# When a workstream specifies repoUrl but no workingDirectory, the repo
# is cloned into this path. If omitted, defaults to /workspace/project
# (if it exists) or a temporary directory under /tmp.
#
# defaultWorkspacePath: /workspace/project

# Channel owner (optional, global).
# Slack user ID to auto-invite when creating new private workstream channels.
# Get your user ID from your Slack profile > "..." menu > "Copy member ID".
#
# channelOwnerUserId: U0123456789

# Default channel (optional, global).
# Slack channel ID to use as a fallback when a workstream has no channel
# configured, or when publishing to the configured channel fails. This
# prevents messages from being silently dropped.
#
# defaultChannel: C0123456789

# Centralized MCP servers (optional).
# When present, these servers are started as HTTP processes by the controller
# and agents connect over HTTP instead of stdio. This enables cross-project
# portability and shared state (e.g., memory, history) across containers.
# Remove this section entirely to use local stdio servers (the default).
#
# mcpServers:
#   ar-memory:
#     source: tools/mcp/memory/server.py
#     port: 7783
#   ar-consultant:
#     source: tools/mcp/consultant/server.py
#     port: 7784

# Pushed MCP tools (optional).
# Tools listed here are served as files by the controller and downloaded into
# dev containers on first use. Unlike centralized servers (which run as HTTP
# processes on the controller), pushed tools run locally inside each container
# via stdio. Use this for tools that depend on per-job state (e.g., the local
# git repo or per-job environment variables).
#
# GitHub token handling:
#   GitHub API authentication uses per-org tokens from the githubOrgs section
#   below. Agents proxy GitHub API calls through the controller's
#   /api/github/proxy endpoint — no token distribution needed.
#
# pushedTools:
#   ar-slack:
#     source: tools/mcp/slack/server.py
#   ar-github:
#     source: tools/mcp/github/server.py

# GitHub organization tokens (REQUIRED for GitHub API access).
# Maps organization names to GitHub personal access tokens. The
# controller validates every token at startup and refuses to start
# if any token is invalid or lacks the required permissions.
# Agents proxy GitHub API calls through the controller — no tokens
# are distributed to agent containers.
#
# githubOrgs:
#   my-org:
#     token: "ghp_org_token_here"
#   other-org:
#     token: "ghp_other_org_token"

workstreams:
  # workstreamId is auto-generated on first run and written back to this file.
  # Do not remove it once generated — it is used for job tracking and threading.

  # Project Alpha — uses repoUrl instead of workingDirectory.
  # The repo is automatically cloned into the default workspace path
  # (or /workspace/project if it exists, or /tmp otherwise).
  - channelId: "C0123456789"           # Get from Slack channel details
    channelName: "#project-alpha-agent"
    defaultBranch: "feature/alpha"
    baseBranch: "master"               # New branches are created from origin/<baseBranch>
    repoUrl: "https://github.com/your-org/project-alpha.git"
    pushToOrigin: true
    allowedTools: "Read,Edit,Write,Bash,Glob,Grep"
    maxTurns: 50
    maxBudgetUsd: 10.0
    # githubOrg: "my-org"             # Routes GitHub API calls through the org's token

  # Project Beta — uses explicit workingDirectory (legacy approach).
  # Uses githubOrg to route GitHub API calls through the correct org token.
  - channelId: "C9876543210"
    channelName: "#project-beta-agent"
    defaultBranch: "feature/beta"
    baseBranch: "master"
    pushToOrigin: true
    workingDirectory: "/workspace/project-beta"
    maxTurns: 100
    maxBudgetUsd: 25.0
    githubOrg: "other-org"
