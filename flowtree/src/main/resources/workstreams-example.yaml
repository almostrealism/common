# Example workstream configuration for FlowTree coding agent jobs
#
# Agents connect INBOUND to the controller's FlowTree server (set
# FLOWTREE_ROOT_HOST and FLOWTREE_ROOT_PORT on each agent). The
# controller distributes jobs to whichever agents are connected.
#
# Copy this file and customize for your workspace:
#   cp workstreams-example.yaml workstreams.yaml
#
# Then run:
#   export SLACK_BOT_TOKEN=xoxb-your-bot-token
#   export SLACK_APP_TOKEN=xapp-your-app-token
#   java -cp flowtree.jar io.flowtree.slack.FlowTreeController --config workstreams.yaml

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------

# Default workspace path (optional).
# When a workstream specifies repoUrl but no workingDirectory, the repo
# is cloned into this path. If omitted, defaults to /workspace/project
# (if it exists) or a temporary directory under /tmp.
#
# defaultWorkspacePath: /workspace/project

# Channel owner (optional).
# Slack user ID to auto-invite when creating new private workstream channels.
# Get your user ID from your Slack profile > "..." menu > "Copy member ID".
#
# channelOwnerUserId: U0123456789

# Default channel (optional).
# Slack channel ID to use as a fallback when a workstream has no channel
# configured, or when publishing to the configured channel fails.
#
# defaultChannel: C0123456789

# ---------------------------------------------------------------------------
# MCP tool delivery
#
# ar-manager is the SINGLE centralized MCP tool for all agent jobs.
# It provides messaging, memory, GitHub, and workstream tools.  Agents
# access it over HTTP with temporary HMAC auth tokens generated by the
# controller at job submission time.
#
# Required environment variables (set in docker-compose.yml or on host):
#
#   AR_MANAGER_URL            - URL of the ar-manager service
#                               (default: http://ar-manager:8010)
#
#   AR_MANAGER_SHARED_SECRET  - Shared secret for HMAC token generation.
#                               Must be the same value on the controller
#                               and ar-manager services.  Generate with:
#                                 openssl rand -base64 32
#
# When these are set, every submitted job receives a temporary auth
# token valid for 12 hours that grants access to ar-manager's tools:
#   send_message, memory_recall, memory_store, memory_branch_context,
#   github_pr_find, github_pr_review_comments, github_pr_conversation,
#   github_pr_reply, github_list_open_prs, github_create_pr,
#   workstream_get_status, controller_health
#
# Project-local tools (ar-test-runner, ar-docs, etc.) are discovered
# from the target repo's .mcp.json and run alongside ar-manager.
# ---------------------------------------------------------------------------

# GitHub organization tokens (REQUIRED for GitHub API access).
# Maps organization names to GitHub personal access tokens. The
# controller validates every token at startup.  Agents proxy GitHub
# API calls through ar-manager → controller → GitHub API.
#
# githubOrgs:
#   my-org:
#     token: "ghp_org_token_here"
#   other-org:
#     token: "ghp_other_org_token"

# ---------------------------------------------------------------------------
# Workstreams
#
# Each workstream maps a branch to a notification channel and agent config.
# workstreamId is auto-generated on first run and written back to this file.
#
# IMPORTANT: repoUrl and defaultBranch are REQUIRED for message storage
# and GitHub operations. The controller uses these to associate messages
# and PRs with the correct branch.
# ---------------------------------------------------------------------------

workstreams:
  # Project Alpha — uses repoUrl for automatic cloning.
  - channelId: "C0123456789"           # Get from Slack channel details
    channelName: "#project-alpha-agent"
    defaultBranch: "feature/alpha"     # REQUIRED for message storage
    baseBranch: "master"               # New branches are created from origin/<baseBranch>
    repoUrl: "https://github.com/your-org/project-alpha.git"  # REQUIRED for message storage
    pushToOrigin: true
    allowedTools: "Read,Edit,Write,Bash,Glob,Grep"
    maxTurns: 50
    maxBudgetUsd: 10.0
    # githubOrg: "my-org"             # Routes GitHub API calls through the org's token

  # Project Beta — uses explicit workingDirectory (legacy approach).
  - channelId: "C9876543210"
    channelName: "#project-beta-agent"
    defaultBranch: "feature/beta"      # REQUIRED for message storage
    baseBranch: "master"
    pushToOrigin: true
    workingDirectory: "/workspace/project-beta"
    repoUrl: "https://github.com/your-org/project-beta.git"  # REQUIRED for message storage
    maxTurns: 100
    maxBudgetUsd: 25.0
    githubOrg: "other-org"
