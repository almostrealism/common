# ─── FlowTree Agent Pool ─────────────────────────────────────────────
#
# Starts the FlowTree agent containers that connect to an existing
# controller and execute ClaudeCodeJob instances.
#
# Pre-build (from repo root):
#   mvn package -pl flowtree/runtime -am -DskipTests
#   mvn dependency:copy-dependencies -pl flowtree/runtime -DoutputDirectory=flowtree/runtime/target/dependency
#
# Quick start:
#   cp .env.example .env        # edit with your values
#   docker compose up -d
#
# Pool size:
#   The pool is defined by the explicit agent services below (agent-1,
#   agent-2). This is deliberate and replaces the old
#   `deploy.replicas: ${AGENT_COUNT}` + `docker compose up --scale agent=N`
#   model. Replicas share an identical mount spec, which is incompatible
#   with the per-agent transcript isolation requirement (see below): a
#   single shared host bind mounted on every replica would let one agent
#   read another agent's transcripts. To add or remove an agent, copy or
#   delete an `agent-N` block and bump its `container_name` and the
#   `/agent-transcripts` host subdirectory.
#
# ─── Volume policy: NO CROSS-AGENT DATA SHARING ──────────────────────
#
# Two agent containers must NEVER be able to exchange data through a
# volume. Writable shared volumes caused the April 2026 cross-workstream
# collision documented in FLOWTREE_COLLISIONS.md, and a shared writable
# directory is also a covert data-exfiltration channel between unrelated
# workstreams. The rules, enforced in two places:
#
#   1. entrypoint.sh refuses to start if any writable mount other than
#      the single sanctioned sink at /agent-transcripts is attached.
#   2. tools/ci/validate_agent_volume_isolation.py fails CI if any two
#      agent services could share data via a volume (a writable source
#      reachable by more than one agent), or if any writable mount
#      targets something other than /agent-transcripts.
#
# Therefore:
#   * Read-only reference mounts (ssh keys, models, samples) may be shared
#     freely — a ro mount cannot carry data FROM one agent TO another.
#   * The ONLY writable mount permitted is /agent-transcripts, and each
#     agent MUST bind a DISTINCT host subdirectory to it. The host has one
#     known parent dir to collect from; each container only ever sees its
#     own subdirectory, so no agent can read another's transcripts.
#   * The repository working tree is NOT a volume — each agent clones into
#     its container-private overlay filesystem at /workspace/project.
#
# ─────────────────────────────────────────────────────────────────────

name: flowtree

# Read-only reference mounts, single-sourced so the two agent services
# stay in sync. These are safe to share across agents precisely because
# they are read-only: no agent can write to them, so they cannot be used
# to pass data between agents.
x-ro-ssh: &vol-ssh "${SSH_KEY_DIR}:/home/agent/.ssh:ro"
x-ro-models: &vol-models "${MODELS_DIR:-/Users/Shared/models}:/models:ro"
x-ro-samples: &vol-samples "${SAMPLES_DIR:-/dev/null}:/samples:ro"

# Everything common to every agent EXCEPT the per-agent identity
# (container_name) and the per-agent transcript bind. Each agent service
# merges this with `<<: *agent-base` and then supplies its own full
# `volumes:` list (YAML merge keys replace sequences rather than append,
# so the list must be repeated per service — hence the *vol-* anchors).
x-agent-base: &agent-base
  build:
    context: ../../..
    dockerfile: flowtree/runtime/agent/Dockerfile
  deploy:
    resources:
      limits:
        cpus: "${AGENT_CPUS:-4}"
        memory: "${AGENT_MEMORY:-4g}"
  environment:
    - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:?Run claude setup-token and set this}
    - FLOWTREE_ROOT_HOST=${FLOWTREE_ROOT_HOST:?Set to controller hostname}
    - FLOWTREE_ROOT_PORT=${FLOWTREE_ROOT_PORT:-7766}
    - FLOWTREE_WORKING_DIR=/workspace/project
    - FLOWTREE_NODE_LABELS=${FLOWTREE_NODE_LABELS:-}
    - GIT_USER_NAME=${GIT_USER_NAME:-FlowTree Agent}
    - GIT_USER_EMAIL=${GIT_USER_EMAIL:-agent@flowtree.io}
    - MAVEN_OPTS=${AGENT_JVM_OPTS:--Xmx2048m}
    # Optional: configures the OpencodeRunner. Unset values leave the
    # runner on its compiled-in defaults (which point at
    # http://localhost:8084/v1 inside the container — almost certainly
    # not what you want unless llama-server is itself running in the
    # agent container). Set OPENCODE_PROVIDER_URL to the host-reachable
    # URL of your OpenAI-compatible inference server; on macOS / Windows
    # Docker Desktop, http://host.docker.internal:<port>/v1 reaches the
    # host's llama.cpp / ollama.
    - OPENCODE_PROVIDER_URL=${OPENCODE_PROVIDER_URL:-}
    - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
    - OPENCODE_DEFAULT_MODEL=${OPENCODE_DEFAULT_MODEL:-}
    # ar-consultant inside the agent container reads this to know which
    # llama.cpp endpoint to call. Leave unset to fall back to the consultant's
    # default (host.docker.internal:8084 inside containers); set to the same
    # endpoint as OPENCODE_PROVIDER_URL minus the trailing `/v1` to share
    # the opencode model.
    - AR_CONSULTANT_LLAMACPP_URL=${AR_CONSULTANT_LLAMACPP_URL:-}
  # Lets containers resolve `mac-studio` to its Tailscale IP. The short
  # MagicDNS name does not propagate into Docker Desktop's embedded DNS
  # resolver — confirmed by `getent hosts mac-studio` failing inside a
  # running agent container while the FQDN `mac-studio.taild0f87.ts.net`
  # succeeds. Pinning the address keeps OPENCODE_PROVIDER_URL stable as
  # `http://mac-studio:<port>/v1` regardless of which tailnet peer hosts
  # the agent. Update the IP if mac-studio's Tailscale address ever
  # changes (rare — it's a stable per-machine assignment).
  extra_hosts:
    - "mac-studio:100.126.249.28"
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"
  # Run an init process (tini) as PID 1 so subprocess grandchildren of the
  # Java Server (claude/opencode CLIs and their python3/java/mvn helpers)
  # get reaped instead of accumulating as <defunct> entries. Without this,
  # AgentInactivityMonitor kills hung helper trees but the JVM (as PID 1)
  # has no SIGCHLD reaper for orphaned grandchildren — flowtree-agent-2
  # accumulated ~40 zombies in the 2026-05-20 incident.
  init: true
  restart: unless-stopped

services:
  agent-1:
    <<: *agent-base
    container_name: flowtree-agent-1
    # The ONLY writable mount: a per-agent transcript sink. The host
    # subdirectory is distinct per agent (…/agent-1) so no other agent
    # can read these transcripts. See the volume policy above.
    volumes:
      - *vol-ssh
      - *vol-models
      - *vol-samples
      - "${TRANSCRIPT_DIR_HOST:-/Users/Shared/flowtree/agent-transcripts}/agent-1:/agent-transcripts:rw"

  agent-2:
    <<: *agent-base
    container_name: flowtree-agent-2
    volumes:
      - *vol-ssh
      - *vol-models
      - *vol-samples
      - "${TRANSCRIPT_DIR_HOST:-/Users/Shared/flowtree/agent-transcripts}/agent-2:/agent-transcripts:rw"
