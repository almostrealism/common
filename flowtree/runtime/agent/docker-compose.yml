# ─── FlowTree Agent Pool ─────────────────────────────────────────────
#
# Starts a configurable number of FlowTree agent containers that
# connect to an existing controller and execute ClaudeCodeJob instances.
#
# Pre-build (from repo root):
#   mvn package -pl flowtree/runtime -am -DskipTests
#   mvn dependency:copy-dependencies -pl flowtree/runtime -DoutputDirectory=flowtree/runtime/target/dependency
#
# Quick start:
#   cp .env.example .env        # edit with your values
#   docker compose up -d
#
# Scale agents:
#   docker compose up -d --scale agent=4
#
# ─────────────────────────────────────────────────────────────────────

name: flowtree

services:
  agent:
    build:
      context: ../../..
      dockerfile: flowtree/runtime/agent/Dockerfile
    deploy:
      replicas: ${AGENT_COUNT:-2}
      resources:
        limits:
          cpus: "${AGENT_CPUS:-4}"
          memory: "${AGENT_MEMORY:-4g}"
    # NO writable volumes. Each agent clones into its container-private
    # overlay filesystem at /workspace/project and uses a container-private
    # ~/.m2 — no sharing across containers, no carry-over across restarts.
    # This is deliberate: writable shared volumes caused the April 2026
    # cross-workstream collision documented in FLOWTREE_COLLISIONS.md.
    # The entrypoint guard refuses to start if any writable volume is
    # attached; adding any RW entry below will break the agent.
    volumes:
      - ${SSH_KEY_DIR}:/home/agent/.ssh:ro
      - ${MODELS_DIR:-/Users/Shared/models}:/models:ro
      - ${SAMPLES_DIR:-/dev/null}:/samples:ro
    environment:
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:?Run claude setup-token and set this}
      - FLOWTREE_ROOT_HOST=${FLOWTREE_ROOT_HOST:?Set to controller hostname}
      - FLOWTREE_ROOT_PORT=${FLOWTREE_ROOT_PORT:-7766}
      - FLOWTREE_WORKING_DIR=/workspace/project
      - FLOWTREE_NODE_LABELS=${FLOWTREE_NODE_LABELS:-}
      - GIT_USER_NAME=${GIT_USER_NAME:-FlowTree Agent}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-agent@flowtree.io}
      - MAVEN_OPTS=${AGENT_JVM_OPTS:--Xmx2048m}
      # Optional: configures the OpencodeRunner. Unset values leave the
      # runner on its compiled-in defaults (which point at
      # http://localhost:8084/v1 inside the container — almost certainly
      # not what you want unless llama-server is itself running in the
      # agent container). Set OPENCODE_PROVIDER_URL to the host-reachable
      # URL of your OpenAI-compatible inference server; on macOS / Windows
      # Docker Desktop, http://host.docker.internal:<port>/v1 reaches the
      # host's llama.cpp / ollama.
      - OPENCODE_PROVIDER_URL=${OPENCODE_PROVIDER_URL:-}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
      - OPENCODE_DEFAULT_MODEL=${OPENCODE_DEFAULT_MODEL:-}
      # ar-consultant inside the agent container reads this to know which
      # llama.cpp endpoint to call. Leave unset to fall back to the consultant's
      # default (host.docker.internal:8084 inside containers); set to the same
      # endpoint as OPENCODE_PROVIDER_URL minus the trailing `/v1` to share
      # the opencode model.
      - AR_CONSULTANT_LLAMACPP_URL=${AR_CONSULTANT_LLAMACPP_URL:-}
    # Lets containers resolve `mac-studio` to its Tailscale IP. The short
    # MagicDNS name does not propagate into Docker Desktop's embedded DNS
    # resolver — confirmed by `getent hosts mac-studio` failing inside a
    # running agent container while the FQDN `mac-studio.taild0f87.ts.net`
    # succeeds. Pinning the address keeps OPENCODE_PROVIDER_URL stable as
    # `http://mac-studio:<port>/v1` regardless of which tailnet peer hosts
    # the agent. Update the IP if mac-studio's Tailscale address ever
    # changes (rare — it's a stable per-machine assignment).
    extra_hosts:
      - "mac-studio:100.126.249.28"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    # Run an init process (tini) as PID 1 so subprocess grandchildren of the
    # Java Server (claude/opencode CLIs and their python3/java/mvn helpers)
    # get reaped instead of accumulating as <defunct> entries. Without this,
    # AgentInactivityMonitor kills hung helper trees but the JVM (as PID 1)
    # has no SIGCHLD reaper for orphaned grandchildren — flowtree-agent-2
    # accumulated ~40 zombies in the 2026-05-20 incident.
    init: true
    restart: unless-stopped

